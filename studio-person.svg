<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <filter id="shadowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#020617" flood-opacity="0.45" />
    </filter>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8d7c2" />
      <stop offset="100%" stop-color="#e6b89b" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <g id="avatarPerson" transform="translate(960, 555)" filter="url(#shadowSoft)">
    <animateTransform attributeName="transform" type="translate" values="960 555; 960 548; 960 557; 960 555" dur="3.2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="0 0 0; -1.2 0 0; 1.2 0 0; 0 0 0" dur="4.4s" repeatCount="indefinite" additive="sum" />

    <ellipse cx="0" cy="398" rx="210" ry="42" fill="#020617" opacity="0.35" />

    <g id="body">
      <path d="M -220 380 C -205 205, -130 112, 0 104 C 130 112, 205 205, 220 380 Z" fill="url(#jacketGrad)" stroke="#475569" stroke-width="4" />
      <path d="M -86 375 L 0 210 L 86 375 Z" fill="url(#shirtGrad)" opacity="0.95" />
      <path d="M -34 375 L 0 248 L 34 375 Z" fill="#fbbf24" opacity="0.95" />
      <rect x="-30" y="84" width="60" height="54" rx="16" fill="url(#skinGrad)" />
      <path d="M -144 218 C -184 256, -198 300, -198 350 L -150 350 C -150 306, -141 266, -108 236 Z" fill="#1e293b" opacity="0.94" />
      <path d="M 144 218 C 184 256, 198 300, 198 350 L 150 350 C 150 306, 141 266, 108 236 Z" fill="#1e293b" opacity="0.94" />
    </g>

    <g id="head">
      <ellipse cx="0" cy="-10" rx="90" ry="102" fill="url(#skinGrad)" />
      <path d="M -96 -26 C -92 -134, -22 -154, 40 -132 C 84 -118, 104 -78, 99 -10 C 88 -54, 56 -76, 10 -74 C -36 -71, -75 -54, -96 -26 Z" fill="url(#hairGrad)" />
      <path d="M -78 -18 C -70 -84, -22 -109, 40 -102 C 78 -98, 104 -76, 108 -30 C 80 -58, 42 -66, 8 -64 C -35 -62, -60 -46, -78 -18 Z" fill="#0b1220" opacity="0.88" />
      <ellipse cx="-33" cy="-10" rx="9" ry="10" fill="#111827" />
      <ellipse cx="33" cy="-10" rx="9" ry="10" fill="#111827" />
      <circle cx="-35" cy="-12" r="2.4" fill="#e2e8f0" />
      <circle cx="31" cy="-12" r="2.4" fill="#e2e8f0" />
      <path d="M -9 10 Q 0 18 9 10" stroke="#9a6b4f" stroke-width="3" fill="none" stroke-linecap="round" />
      <path d="M -31 42 Q 0 58 31 42" stroke="#7c2d12" stroke-width="4" fill="none" stroke-linecap="round" />
    </g>

    <g id="headset">
      <path d="M -100 -6 A 102 102 0 0 1 100 -6" fill="none" stroke="#0f172a" stroke-width="18" />
      <rect x="-116" y="-26" width="32" height="74" rx="15" fill="#111827" />
      <rect x="84" y="-26" width="32" height="74" rx="15" fill="#111827" />
      <path d="M 98 18 Q 138 24 146 68" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round" />
      <circle cx="151" cy="74" r="8" fill="#fbbf24">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="1.3s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
</svg>
