        <rect x="-22" y="-28" width="44" height="36" rx="10" fill="#1e293b" />
        <rect x="-25" y="8" width="8" height="56" rx="4" fill="#0f172a" />
        <rect x="17" y="8" width="8" height="56" rx="4" fill="#0f172a" />
      </g>

      <g id="rightChair" transform="translate(360, 160)">
