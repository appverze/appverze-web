<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <filter id="shadowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.42" />
    </filter>
  </defs>

  <g id="avatarPerson" transform="translate(960, 560)">
    <animateTransform attributeName="transform" type="translate" values="960 560; 968 558; 952 562; 960 560" dur="7.5s" repeatCount="indefinite" />

    <ellipse cx="-160" cy="360" rx="95" ry="22" fill="#020617" opacity="0.28" />
    <ellipse cx="170" cy="360" rx="95" ry="22" fill="#020617" opacity="0.28" />

    <g id="maleWalker" transform="translate(-170, 120)" filter="url(#shadowSoft)">
      <animateTransform attributeName="transform" type="translate" values="-170 120; -130 120; -170 120" dur="3.4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0; 0 4; 0 0" dur="0.9s" repeatCount="indefinite" additive="sum" />

      <g id="maleHead">
        <circle cx="0" cy="-110" r="40" fill="#f2c8a8" />
        <path d="M -42 -118 C -35 -160, 35 -160, 42 -116 C 26 -130, -26 -130, -42 -118 Z" fill="#111827" />
        <path d="M -44 -113 A 44 44 0 0 1 44 -113" fill="none" stroke="#0f172a" stroke-width="10" />
        <rect x="-52" y="-120" width="12" height="34" rx="6" fill="#0f172a" />
        <rect x="40" y="-120" width="12" height="34" rx="6" fill="#0f172a" />
      </g>

      <rect x="-26" y="-70" width="52" height="72" rx="16" fill="#1e293b" />
      <rect x="-8" y="-76" width="16" height="18" rx="6" fill="#f2c8a8" />

      <g transform="translate(-24,-44)">
        <rect x="0" y="0" width="12" height="52" rx="6" fill="#334155">
          <animateTransform attributeName="transform" type="rotate" values="22 6 0; -22 6 0; 22 6 0" dur="0.9s" repeatCount="indefinite" />
        </rect>
      </g>
      <g transform="translate(12,-44)">
        <rect x="0" y="0" width="12" height="52" rx="6" fill="#334155">
          <animateTransform attributeName="transform" type="rotate" values="-22 6 0; 22 6 0; -22 6 0" dur="0.9s" repeatCount="indefinite" />
        </rect>
      </g>

      <g transform="translate(-16,2)">
        <rect x="0" y="0" width="14" height="74" rx="7" fill="#0f172a">
          <animateTransform attributeName="transform" type="rotate" values="-22 7 0; 24 7 0; -22 7 0" dur="0.9s" repeatCount="indefinite" />
        </rect>
        <rect x="-4" y="72" width="22" height="10" rx="5" fill="#111827" />
      </g>
      <g transform="translate(2,2)">
        <rect x="0" y="0" width="14" height="74" rx="7" fill="#0f172a">
          <animateTransform attributeName="transform" type="rotate" values="24 7 0; -22 7 0; 24 7 0" dur="0.9s" repeatCount="indefinite" />
        </rect>
        <rect x="-4" y="72" width="22" height="10" rx="5" fill="#111827" />
      </g>
    </g>

    <g id="femaleWalker" transform="translate(150, 124)" filter="url(#shadowSoft)">
      <animateTransform attributeName="transform" type="translate" values="150 124; 190 124; 150 124" dur="3.4s" begin="0.28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 4; 0 0; 0 -4; 0 0" dur="0.9s" begin="0.28s" repeatCount="indefinite" additive="sum" />

      <g id="femaleHead">
        <circle cx="0" cy="-112" r="38" fill="#f5cfb4" />
        <path d="M -44 -130 C -30 -170, 30 -170, 44 -128 C 24 -145, -24 -145, -44 -130 Z" fill="#1f2937" />
        <path d="M -40 -122 C -54 -90, -46 -42, -16 -26 L -8 -36 C -30 -48, -34 -88, -24 -116 Z" fill="#1f2937" />
        <path d="M 40 -122 C 54 -90, 46 -42, 16 -26 L 8 -36 C 30 -48, 34 -88, 24 -116 Z" fill="#1f2937" />
      </g>

      <rect x="-24" y="-70" width="48" height="70" rx="14" fill="#7c3aed" />
      <rect x="-8" y="-76" width="16" height="16" rx="6" fill="#f5cfb4" />

      <g transform="translate(-22,-42)">
        <rect x="0" y="0" width="11" height="48" rx="6" fill="#6d28d9">
          <animateTransform attributeName="transform" type="rotate" values="-24 5.5 0; 20 5.5 0; -24 5.5 0" dur="0.9s" begin="0.28s" repeatCount="indefinite" />
        </rect>
      </g>
      <g transform="translate(11,-42)">
        <rect x="0" y="0" width="11" height="48" rx="6" fill="#6d28d9">
          <animateTransform attributeName="transform" type="rotate" values="20 5.5 0; -24 5.5 0; 20 5.5 0" dur="0.9s" begin="0.28s" repeatCount="indefinite" />
        </rect>
      </g>

      <g transform="translate(-14,0)">
        <rect x="0" y="0" width="13" height="72" rx="7" fill="#312e81">
          <animateTransform attributeName="transform" type="rotate" values="22 6.5 0; -24 6.5 0; 22 6.5 0" dur="0.9s" begin="0.28s" repeatCount="indefinite" />
        </rect>
        <rect x="-4" y="70" width="22" height="10" rx="5" fill="#111827" />
      </g>
      <g transform="translate(1,0)">
        <rect x="0" y="0" width="13" height="72" rx="7" fill="#312e81">
          <animateTransform attributeName="transform" type="rotate" values="-24 6.5 0; 22 6.5 0; -24 6.5 0" dur="0.9s" begin="0.28s" repeatCount="indefinite" />
        </rect>
        <rect x="-4" y="70" width="22" height="10" rx="5" fill="#111827" />
      </g>
    </g>
  </g>
</svg>
