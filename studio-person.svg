        <rect x="-22" y="-28" width="44" height="36" rx="10" fill="#5b21b6" />
        <rect x="-25" y="8" width="8" height="56" rx="4" fill="#312e81" />
        <rect x="17" y="8" width="8" height="56" rx="4" fill="#312e81" />
