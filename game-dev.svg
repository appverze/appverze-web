<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neonGreen" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="neonPurple" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>

    <!-- Desk Gradient -->
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Studio Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />

  <!-- Grid Pattern on Wall (Cyberpunk feel) -->
  <g stroke="#334155" stroke-width="2" opacity="0.3">
    <line x1="0" y1="200" x2="1920" y2="200" />
    <line x1="0" y1="400" x2="1920" y2="400" />
    <line x1="0" y1="600" x2="1920" y2="600" />
    <line x1="0" y1="800" x2="1920" y2="800" />
    <line x1="480" y1="0" x2="480" y2="1080" />
    <line x1="960" y1="0" x2="960" y2="1080" />
    <line x1="1440" y1="0" x2="1440" y2="1080" />
  </g>

  <!-- Spotlights -->
  <polygon points="400,-100 -200,1080 1000,1080" fill="url(#neonGreen)" />
  <polygon points="1520,-100 920,1080 2120,1080" fill="url(#neonPurple)" />

  <!-- 2. Studio Screens & Monitors -->
  <!-- Left Screen (Code / Engine) -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="450" height="280" rx="15" fill="#000" stroke="#22c55e" stroke-width="4" filter="url(#glow-green)" />
    <rect x="20" y="20" width="410" height="240" rx="5" fill="#064e3b" opacity="0.3" />
    <text x="40" y="60" fill="#4ade80" font-family="monospace" font-size="18" font-weight="bold">
      <tspan x="40" dy="0">function initGame() {</tspan>
      <tspan x="60" dy="30">engine.loadAssets();</tspan>
      <tspan x="60" dy="30">player.spawn(0, 0);</tspan>
      <tspan x="60" dy="30">world.render();</tspan>
      <tspan x="40" dy="30">}</tspan>
      <tspan x="40" dy="40" fill="#22c55e">> SYSTEM READY_</tspan>
    </text>
  </g>

  <!-- Right Screen (Game Preview) -->
  <g transform="translate(1320, 250)">
    <rect x="0" y="0" width="450" height="280" rx="15" fill="#000" stroke="#a855f7" stroke-width="4" filter="url(#glow-purple)" />
    <rect x="20" y="20" width="410" height="240" rx="5" fill="#2e1065" opacity="0.5" />
    <!-- Game Graphics Mockup -->
    <polygon points="225,50 100,150 350,150" fill="#c084fc" opacity="0.8" />
    <polygon points="225,100 150,200 300,200" fill="#9333ea" />
    <circle cx="150" cy="80" r="20" fill="#fbbf24" filter="url(#glow-purple)" />
    <rect x="40" y="220" width="370" height="30" rx="5" fill="#000" opacity="0.6" />
    <rect x="45" y="225" width="250" height="20" rx="3" fill="#a855f7" />
  </g>

  <!-- Center Top Screen (Logo) -->
  <g transform="translate(710, 80)">
    <rect x="0" y="0" width="500" height="150" rx="20" fill="#000" stroke="#334155" stroke-width="3" />
    <text x="250" y="90" fill="#fff" font-family="sans-serif" font-size="45" font-weight="900" letter-spacing="3" text-anchor="middle">APPVERZE<tspan fill="#22c55e"> DEV</tspan></text>
  </g>

  <!-- 3. Studio Desk -->
  <path d="M 0 880 Q 960 820 1920 880 L 1920 1080 L 0 1080 Z" fill="url(#deskGrad)" />
  <!-- Desk Edge Highlight -->
  <path d="M 0 880 Q 960 820 1920 880" fill="none" stroke="#334155" stroke-width="8" />
  <path d="M 0 880 Q 960 820 1920 880" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5" filter="url(#glow-green)" />

  <!-- 4. Game Dev Props on Desk -->
  <!-- Mechanical Keyboard -->
  <g transform="translate(800, 920) rotate(-5)">
    <rect x="0" y="0" width="320" height="100" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <!-- Keys with RGB glow -->
    <rect x="20" y="20" width="20" height="20" rx="4" fill="#1e293b" />
    <rect x="50" y="20" width="20" height="20" rx="4" fill="#1e293b" />
    <rect x="80" y="20" width="20" height="20" rx="4" fill="#1e293b" />
    
    <!-- WASD Keys highlighted -->
    <rect x="60" y="50" width="20" height="20" rx="4" fill="#22c55e" filter="url(#glow-green)" />
    <rect x="30" y="75" width="20" height="20" rx="4" fill="#22c55e" filter="url(#glow-green)" />
    <rect x="60" y="75" width="20" height="20" rx="4" fill="#22c55e" filter="url(#glow-green)" />
    <rect x="90" y="75" width="20" height="20" rx="4" fill="#22c55e" filter="url(#glow-green)" />
    
    <rect x="130" y="75" width="150" height="20" rx="4" fill="#1e293b" />
  </g>

  <!-- Game Controller / Gamepad -->
  <g transform="translate(1250, 900) rotate(15)">
    <path d="M 0 40 C 0 0, 150 0, 150 40 C 150 80, 120 100, 100 100 C 80 100, 75 70, 75 70 C 75 70, 70 100, 50 100 C 30 100, 0 80, 0 40 Z" fill="#1e293b" stroke="#475569" stroke-width="3" />
    <!-- D-Pad -->
    <rect x="25" y="30" width="30" height="10" fill="#0f172a" />
    <rect x="35" y="20" width="10" height="30" fill="#0f172a" />
    <!-- Action Buttons -->
    <circle cx="120" cy="30" r="6" fill="#ef4444" />
    <circle cx="105" cy="45" r="6" fill="#3b82f6" />
    <circle cx="135" cy="45" r="6" fill="#eab308" />
    <circle cx="120" cy="60" r="6" fill="#22c55e" />
    <!-- Analog Sticks -->
    <circle cx="50" cy="70" r="12" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <circle cx="100" cy="70" r="12" fill="#0f172a" stroke="#334155" stroke-width="2" />
  </g>
</svg>