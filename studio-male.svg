<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <filter id="shadowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.42" />
    </filter>
  </defs>

  <g id="maleWalker" transform="translate(700, 680)" filter="url(#shadowSoft)">
    <animateTransform attributeName="transform" type="translate" values="520 680; 1400 680" dur="8s" repeatCount="indefinite" />
