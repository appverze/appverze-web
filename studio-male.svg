        <animateTransform attributeName="transform" type="rotate" values="-22 6 0; 22 6 0; -22 6 0" dur="0.9s" repeatCount="indefinite" />
      </rect>
    </g>

    <g transform="translate(-16,2)">
      <rect x="0" y="0" width="14" height="74" rx="7" fill="#0f172a">
        <animateTransform attributeName="transform" type="rotate" values="-22 7 0; 24 7 0; -22 7 0" dur="0.9s" repeatCount="indefinite" />
      </rect>
      <rect x="-4" y="72" width="22" height="10" rx="5" fill="#111827" />
    </g>
    <g transform="translate(2,2)">
      <rect x="0" y="0" width="14" height="74" rx="7" fill="#0f172a">
