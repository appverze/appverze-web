      <path d="M -44 -113 A 44 44 0 0 1 44 -113" fill="none" stroke="#0f172a" stroke-width="10" />
      <rect x="-52" y="-120" width="12" height="34" rx="6" fill="#0f172a" />
      <rect x="40" y="-120" width="12" height="34" rx="6" fill="#0f172a" />
      <line x1="-20" y1="-116" x2="-8" y2="-118" stroke="#7c3f2a" stroke-width="2.5" stroke-linecap="round" />
      <line x1="8" y1="-118" x2="20" y2="-116" stroke="#7c3f2a" stroke-width="2.5" stroke-linecap="round" />
      <ellipse cx="-13" cy="-106" rx="4" ry="4.5" fill="#111827" />
      <ellipse cx="13" cy="-106" rx="4" ry="4.5" fill="#111827" />
      <circle cx="-14" cy="-107" r="1.2" fill="#f8fafc" />
      <circle cx="12" cy="-107" r="1.2" fill="#f8fafc" />
      <path d="M -1 -100 Q 3 -95 0 -90" fill="none" stroke="#a55f42" stroke-width="2" stroke-linecap="round" />
      <path d="M -11 -82 Q 0 -76 11 -82" fill="none" stroke="#7c2d12" stroke-width="2.8" stroke-linecap="round" />
    </g>

    <rect x="-26" y="-70" width="52" height="72" rx="16" fill="#1e293b" />
    <rect x="-8" y="-76" width="16" height="18" rx="6" fill="#f2c8a8" />

    <g transform="translate(-24,-44)">
      <rect x="0" y="0" width="12" height="52" rx="6" fill="#334155">
        <animateTransform attributeName="transform" type="rotate" values="22 6 0; -22 6 0; 22 6 0" dur="0.9s" repeatCount="indefinite" />
      </rect>
    </g>
    <g transform="translate(12,-44)">
