<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050510" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <linearGradient id="window" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="sofaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Room Background -->
  <rect width="1920" height="1080" fill="url(#bg)" />

  <!-- Big Panoramic Window -->
  <path d="M 200 100 L 1720 100 Q 1820 100 1820 200 L 1820 700 L 100 700 L 100 200 Q 100 100 200 100 Z" fill="url(#window)" />
  
  <!-- Cityscape / Cyberpunk View in Window -->
  <g opacity="0.8">
    <!-- Stars -->
    <circle cx="500" cy="200" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="1200" cy="150" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="800" cy="300" r="1.5" fill="#fff" />
    <circle cx="1500" cy="250" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="300" cy="350" r="1.5" fill="#fff" opacity="0.9"/>
    
    <!-- Buildings -->
    <rect x="300" y="450" width="80" height="250" fill="#020617" />
    <rect x="420" y="350" width="120" height="350" fill="#020617" />
    <polygon points="420,350 480,300 540,350" fill="#020617" />
    
    <rect x="600" y="500" width="150" height="200" fill="#020617" />
    <rect x="800" y="400" width="100" height="300" fill="#020617" />
    
    <rect x="1100" y="450" width="90" height="250" fill="#020617" />
    <rect x="1250" y="300" width="140" height="400" fill="#020617" />
    <polygon points="1250,300 1320,200 1390,300" fill="#020617" />
    
    <rect x="1450" y="480" width="120" height="220" fill="#020617" />
    <rect x="1600" y="380" width="100" height="320" fill="#020617" />
    
    <!-- Neon Accents on Buildings -->
    <line x1="480" y1="360" x2="480" y2="650" stroke="#38bdf8" stroke-width="2" filter="url(#glow)"/>
    <line x1="1320" y1="320" x2="1320" y2="600" stroke="#a855f7" stroke-width="2" filter="url(#glow)"/>
    <circle cx="850" cy="420" r="4" fill="#fbbf24" filter="url(#glow)"/>
    <circle cx="1650" cy="400" r="4" fill="#ef4444" filter="url(#glow)"/>
  </g>
  
  <!-- Window Frame -->
  <path d="M 200 100 L 1720 100 Q 1820 100 1820 200 L 1820 700 L 100 700 L 100 200 Q 100 100 200 100 Z" fill="none" stroke="#1e293b" stroke-width="25" />
  <line x1="673" y1="100" x2="673" y2="700" stroke="#1e293b" stroke-width="20" />
  <line x1="1246" y1="100" x2="1246" y2="700" stroke="#1e293b" stroke-width="20" />
  <line x1="100" y1="400" x2="1820" y2="400" stroke="#1e293b" stroke-width="20" />

  <!-- Floor -->
  <polygon points="0,700 1920,700 1920,1080 0,1080" fill="#0f172a" />
  <polygon points="0,700 1920,700 1920,1080 0,1080" fill="url(#bg)" opacity="0.6"/>
  <!-- Floor Grid / Reflection -->
  <path d="M 960 700 L 960 1080 M 673 700 L 300 1080 M 1246 700 L 1620 1080" stroke="#1e293b" stroke-width="4" opacity="0.5"/>

  <!-- Lounge Sofa (Curved & Modern) -->
  <path d="M 300 900 Q 960 750 1620 900 L 1700 1050 L 220 1050 Z" fill="url(#sofaGrad)" stroke="#38bdf8" stroke-width="3" filter="url(#glow)"/>
  <path d="M 300 900 Q 960 750 1620 900 L 1580 950 Q 960 820 340 950 Z" fill="#334155" />
  
  <!-- Cushions -->
  <rect x="500" y="860" width="150" height="60" rx="30" fill="#475569" transform="rotate(-10 500 860)" />
  <rect x="1200" y="830" width="150" height="60" rx="30" fill="#475569" transform="rotate(10 1200 830)" />

  <!-- Glowing Coffee Table -->
  <ellipse cx="960" cy="980" rx="280" ry="70" fill="#020617" stroke="#a855f7" stroke-width="6" filter="url(#glow)"/>
  <ellipse cx="960" cy="980" rx="260" ry="60" fill="#0f172a" opacity="0.9"/>
  <!-- Table Hologram / Centerpiece -->
  <circle cx="960" cy="950" r="40" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#glow)"/>
  <circle cx="960" cy="950" r="20" fill="none" stroke="#fbbf24" stroke-width="4" filter="url(#glow)"/>
  <path d="M 960 950 L 960 880" stroke="#38bdf8" stroke-width="2" filter="url(#glow)" stroke-dasharray="5,5"/>

  <!-- Holographic Plants -->
  <!-- Left Plant -->
  <g transform="translate(250, 800)">
    <path d="M 0 100 Q -60 0 -120 -60 Q -40 -30 0 100" fill="none" stroke="#34d399" stroke-width="5" filter="url(#glow)"/>
    <path d="M 0 100 Q 60 -20 90 -90 Q 40 -40 0 100" fill="none" stroke="#34d399" stroke-width="5" filter="url(#glow)"/>
    <path d="M 0 100 Q 0 -60 15 -120 Q -15 -50 0 100" fill="none" stroke="#34d399" stroke-width="5" filter="url(#glow)"/>
    <polygon points="-35,100 35,100 25,180 -25,180" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  </g>
  <!-- Right Plant -->
  <g transform="translate(1670, 800)">
    <path d="M 0 100 Q -60 -20 -90 -90 Q -40 -40 0 100" fill="none" stroke="#34d399" stroke-width="5" filter="url(#glow)"/>
    <path d="M 0 100 Q 60 0 120 -60 Q 40 -30 0 100" fill="none" stroke="#34d399" stroke-width="5" filter="url(#glow)"/>
    <path d="M 0 100 Q 0 -60 -15 -120 Q 15 -50 0 100" fill="none" stroke="#34d399" stroke-width="5" filter="url(#glow)"/>
    <polygon points="-35,100 35,100 25,180 -25,180" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  </g>

  <!-- Ambient Ceiling Lights -->
  <circle cx="300" cy="0" r="300" fill="#38bdf8" opacity="0.15" filter="url(#glow-soft)"/>
  <circle cx="1620" cy="0" r="300" fill="#a855f7" opacity="0.15" filter="url(#glow-soft)"/>
</svg>