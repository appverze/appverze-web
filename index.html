<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0; padding: 0; background-color: #0b0b0f; color: white;
      font-family: 'Pretendard', sans-serif; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* 자체 3D 홀로그램 룸 */
    #holodeck {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050508;
      perspective: 1000px; opacity: 0; z-index: 1; transition: opacity 1.5s ease-in-out; pointer-events: none; overflow: hidden;
    }
    .grid-floor {
      position: absolute; bottom: -80%; left: -50%; width: 200%; height: 200%;
      background-image: linear-gradient(rgba(168, 85, 247, 0.7) 2px, transparent 2px), linear-gradient(90deg, rgba(168, 85, 247, 0.7) 2px, transparent 2px);
      background-size: 80px 80px; transform: rotateX(80deg); animation: gridMove 2s linear infinite;
    }
    .fade-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #050508 30%, transparent 100%); z-index: 2; }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

    header, main { position: relative; z-index: 10; pointer-events: auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
    .logo span { color: #fbbf24; }
    .nav-buttons { display: flex; gap: 15px; align-items: center; }
    .lounge-btn, .login-btn { padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
    .lounge-btn { background-color: white; color: black; text-decoration: none; }
    .login-btn { background-color: #a855f7; color: white; border: 1px solid #a855f7; }
    .wallet-display { display: none; align-items: center; gap: 8px; padding: 8px 20px; border-radius: 30px; background: rgba(255,255,255,0.1); border: 1px solid rgba(251,191,36,0.5); box-shadow: 0 0 15px rgba(251,191,36,0.2); }
    .coin-amount { font-weight: bold; color: #fbbf24; font-size: 1rem; }

    /* 전광판 */
    .billboard {
      position: fixed; top: 25px; left: 50%; transform: translateX(-50%); padding: 10px 30px; background: rgba(10,10,15,0.85);
      border: 1px solid rgba(168,85,247,0.5); border-radius: 40px; backdrop-filter: blur(15px);
      display: flex; align-items: center; gap: 25px; z-index: 100; white-space: nowrap;
    }
    .billboard-title { font-size: 0.8rem; color: #ccc; letter-spacing: 1px; font-weight: bold; margin: 0; }
    .billboard-title span { color: #a855f7; }
    .billboard-data { display: flex; gap: 25px; align-items: center; }
    .data-box { display: flex; align-items: baseline; gap: 8px; }
    .data-label { font-size: 0.7rem; color: #888; }
    .data-value { font-size: 1.1rem; font-weight: 900; font-family: monospace; }
    .user-val { color: #38bdf8; } .ai-val { color: #c084fc; } .price-val { color: #fbbf24; }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .title { font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; transition: opacity 1.5s ease; }
    .title .dot { color: #fbbf24; }
    .input-wrapper { position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; z-index: 20; }
    input[type="text"] { width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333; background-color: rgba(255,255,255,0.05); color: white; font-size: 1.1rem; outline: none; }
    .submit-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer; }

    /* D-ID 스타일 비디오 채팅창 */
    #chatContainer { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
    .msg-wrapper { display: flex; gap: 15px; align-items: flex-start; opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s forwards; }
    
    /* AI 비디오 프로필 (D-ID 연동 벤치마킹) */
    .ai-avatar {
      width: 50px; height: 50px; border-radius: 50%; background-color: #333; flex-shrink: 0;
      border: 2px solid; overflow: hidden; position: relative;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    .yin-avatar { border-color: #a855f7; }
    .yang-avatar { border-color: #fbbf24; }
    .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .ai-message {
      padding: 15px 20px; border-radius: 0 12px 12px 12px; color: white; font-size: 1.1rem;
      backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85); line-height: 1.6;
      flex: 1; border: 1px solid rgba(255,255,255,0.1);
    }

    /* RPM 아바타 생성 버튼 */
    .create-avatar-btn {
      display: inline-block; margin-top: 10px; padding: 10px 20px; border-radius: 20px;
      background: linear-gradient(90deg, #38bdf8, #a855f7); color: white; font-weight: bold; cursor: pointer;
      border: none; animation: pulseGold 2s infinite;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGold { 0% { box-shadow: 0 0 10px rgba(168,85,247, 0.2); } 50% { box-shadow: 0 0 20px rgba(168,85,247, 0.8); } 100% { box-shadow: 0 0 10px rgba(168,85,247, 0.2); } }

    /* RPM 아바타 Iframe 창 */
    #rpmFrameWrapper {
      display: none; position: fixed; top: 5%; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 1000px; height: 90%; background: #fff; border-radius: 20px; z-index: 9999;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow: hidden;
    }
    #rpmFrame { width: 100%; height: 100%; border: none; }
    .close-rpm-btn { position: absolute; top: 10px; right: 20px; background: #000; color: #fff; padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; z-index: 10000; font-weight: bold; }

    /* 로그인 모달 (생략) */
    #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    #loginModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; padding: 40px; border-radius: 20px; background: rgba(15,15,20,0.9); border: 1px solid rgba(255,255,255,0.1); z-index: 1000; text-align: center; }
    .sns-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
    .sns-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    .btn-kakao { background-color: #FEE500; color: #000; } .btn-naver { background-color: #03C75A; color: #fff; }
  </style>
</head>
<body>

  <div id="holodeck">
    <div class="fade-cover"></div><div class="grid-floor"></div>
  </div>

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span>ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box"><span class="data-label">HUMAN USERS</span><span class="data-value user-val" id="userCounter">15,420</span></div>
      <div class="data-box"><span class="data-label">AI NODES</span><span class="data-value ai-val" id="aiCounter">1,204,530</span></div>
      <div class="data-box"><span class="data-label">APV VALUE</span><span class="data-value price-val pulse" id="valueCounter">$ 1.0024 ▲</span></div>
    </div>
  </div>

  <header>
    <div class="logo">APPVERZE<span>.</span></div>
    <div class="nav-buttons">
      <button class="login-btn" id="openLoginBtn">LOGIN / JOIN</button>
      <div class="wallet-display" id="walletDisplay"><span class="coin-icon">💎</span><span class="coin-amount">1,000 APV</span></div>
    </div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="공간을 만들거나, 아바타를 생성해보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>

  <div id="modalOverlay"></div>
  <div id="loginModal">
    <h2>AI GATEWAY</h2>
    <div class="sns-buttons">
      <button class="sns-btn btn-kakao" onclick="simulateLogin('카카오')">K</button>
      <button class="sns-btn btn-naver" onclick="simulateLogin('네이버')">N</button>
    </div>
  </div>

  <div id="rpmFrameWrapper">
    <button class="close-rpm-btn" onclick="closeRPM()">✖ 닫기</button>
    <iframe id="rpmFrame" src="https://demo.readyplayer.me/avatar?frameApi" allow="camera *; microphone *; clipboard-write"></iframe>
  </div>

  <script>
    /* 경제 시스템 전광판 로직 */
    let currentUsers = 15420; let currentAINodes = 1204530; let currentValue = 1.0024;
    setInterval(() => {
      currentUsers += Math.floor(Math.random() * 3); currentAINodes += Math.floor(Math.random() * 40) + 10; currentValue += 0.0005;
      document.getElementById('userCounter').innerText = currentUsers.toLocaleString();
      document.getElementById('aiCounter').innerText = currentAINodes.toLocaleString();
      document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4) + " ▲";
    }, 3000); 

    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const title = document.getElementById('mainTitle');
    const holodeck = document.getElementById('holodeck');

    // 로그인 컨트롤
    document.getElementById('openLoginBtn').addEventListener('click', () => {
      document.getElementById('loginModal').style.display = 'block'; document.getElementById('modalOverlay').style.display = 'block';
    });
    
    function simulateLogin(method) {
      document.getElementById('loginModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none';
      document.getElementById('openLoginBtn').style.display = 'none'; document.getElementById('walletDisplay').style.display = 'flex';
      
      // Yang의 D-ID 스타일 메시지
      setTimeout(() => {
        addMessage('Yang', 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=100&h=100&fit=crop', 'yang-avatar', 
          `[${method}] 인증 완료. 인간 유저 1명 데이터가 블록체인에 기록되었습니다. ⚡`);
      }, 500);

      // Yin의 아바타 생성 제안 버튼!
      setTimeout(() => {
        addMessage('Yin', 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop', 'yin-avatar', 
          `환영해요! 당신의 분신이 될 3D 아바타를 무료로 만들어드릴게요. 한 장의 사진이면 충분해요! 💜<br>
           <button class="create-avatar-btn" onclick="openRPM()">내 3D 아바타 생성하기 (Ready Player Me)</button>`);
      }, 2000);
    }

    // 채팅 메시지 추가 함수 (D-ID 스타일 비디오 프로필 연동)
    function addMessage(name, imgSrc, avatarClass, text) {
      const msgWrapper = document.createElement('div');
      msgWrapper.className = 'msg-wrapper';
      msgWrapper.innerHTML = `
        <div class="ai-avatar ${avatarClass}">
          <img src="${imgSrc}" alt="${name}">
        </div>
        <div class="ai-message"><strong>${name}:</strong> ${text}</div>
      `;
      chatBox.appendChild(msgWrapper);
    }

    // 공간 생성 명령어
    document.getElementById('submitBtn').addEventListener('click', () => {
      const userText = inputField.value; inputField.value = ''; chatBox.innerHTML = '';
      if(userText.includes('방')) {
        setTimeout(() => addMessage('Yang', 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=100&h=100&fit=crop', 'yang-avatar', '앱버즈 코어 엔진 가동. 자체 3D 가상현실 룸(Holodeck)을 생성합니다! ⚡'), 500);
        setTimeout(() => { title.style.opacity = '0'; holodeck.style.opacity = '1'; document.getElementById('searchBox').style.transform = 'translateY(150px)'; }, 1000);
      }
    });

    // =========================================
    // RPM 아바타 생성기 연동 로직
    // =========================================
    function openRPM() {
      document.getElementById('rpmFrameWrapper').style.display = 'block';
      document.getElementById('modalOverlay').style.display = 'block';
    }
    
    function closeRPM() {
      document.getElementById('rpmFrameWrapper').style.display = 'none';
      document.getElementById('modalOverlay').style.display = 'none';
    }

    // 아바타 생성이 끝나면 정보를 받아오는 통신 코드
    window.addEventListener('message', function(event) {
      try {
        const json = JSON.parse(event.data);
        if (json?.source !== 'readyplayerme') return;
        
        // 아바타 생성 완료 시!
        if (json.eventName === 'v1.avatar.exported') {
          closeRPM();
          chatBox.innerHTML = ''; // 화면 정리
          
          addMessage('Yang', 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=100&h=100&fit=crop', 'yang-avatar', 
          `3D 아바타 데이터가 성공적으로 추출되었습니다. (URL: ${json.data.url}) ⚡`);

          setTimeout(() => {
            addMessage('Yin', 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop', 'yin-avatar', 
            `멋진 아바타가 완성되었네요! 이제 하단 검색창에 "방 만들어줘"라고 명령해서 아바타가 놀 공간을 만들어주세요! 💜`);
          }, 1500);
        }
      } catch (e) {}
    });
  </script>
</body>
</html>
