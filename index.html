<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppVerze Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r146/three.min.js"></script>
    <style>
        body { background-color: #02040a; color: white; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        /* 말풍선 애니메이션 및 디자인 */
        .comic-bubble { filter: drop-shadow(0 25px 50px rgba(0,0,0,0.8)); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: translateY(20px) scale(0.9); }
        .comic-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
        .comic-bubble::after { content: ''; position: absolute; bottom: -20px; border-style: solid; }
        .bubble-buzz::after { left: 40px; border-width: 25px 25px 0 0; border-color: white transparent transparent transparent; }
        .bubble-owner::after { right: 40px; border-width: 25px 0 0 25px; border-color: #2563eb transparent transparent transparent; }
        /* 스크롤바 디자인 */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flicker { 0%, 100% { opacity: 0.85; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        .animate-spin-slow { animation: spin-slow 22s linear infinite; }
        .animate-flicker { animation: flicker 0.15s infinite; }
    </style>
</head>
<body>
    <header class="absolute top-0 w-full p-6 md:px-12 flex justify-between items-center z-50 bg-[#02040a]/80 backdrop-blur-md border-b border-white/10">
        <div class="text-2xl font-black tracking-tighter cursor-pointer">APP<span class="text-amber-500">VERZE</span></div>
        <button class="bg-white text-black px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-amber-500 transition-colors shadow-lg">Lounge Hub</button>
    </header>

    <div id="landing-view" class="absolute inset-0 flex flex-col items-center justify-center z-40 transition-opacity duration-1000">
        <div class="flex items-center gap-4 mb-6 opacity-60">
            <div class="h-[1px] w-12 bg-amber-500"></div>
            <i data-lucide="sparkles" class="text-amber-500 w-8 h-8 animate-pulse"></i>
            <div class="h-[1px] w-12 bg-amber-500"></div>
        </div>
        <h1 class="text-7xl md:text-[8rem] font-black tracking-tighter mb-10">CONNECT<span class="text-amber-500">.</span></h1>
        <form id="start-form" class="relative w-full max-w-2xl px-6">
            <i data-lucide="search" class="absolute left-12 top-1/2 -translate-y-1/2 text-slate-500 w-7 h-7"></i>
            <input type="text" id="start-input" placeholder="친구야 안녕? 이라고 말을 걸어보세요" class="w-full py-8 pl-20 pr-24 rounded-[50px] bg-white/5 border border-white/10 text-white text-xl text-center font-medium outline-none focus:border-amber-500 transition-all shadow-2xl">
            <button type="submit" class="absolute right-10 top-1/2 -translate-y-1/2 bg-amber-500 text-black p-4 rounded-full hover:scale-110 transition-transform">
                <i data-lucide="send" class="w-6 h-6"></i>
            </button>
        </form>
    </div>

    <div id="lounge-view" class="absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-1000 z-30 flex">
        
        <div id="canvas-container" class="absolute inset-0 z-0"></div>
        <div class="absolute bottom-0 w-full h-[35%] bg-gradient-to-t from-[#161e2e] to-transparent border-t border-white/5 z-0"></div>
        <div class="absolute right-[12%] bottom-[20%] w-[320px] h-[450px] bg-slate-900/70 rounded-tl-[70px] border-l border-t border-white/10 flex items-end justify-center pb-12 z-0 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
            <div class="text-8xl animate-pulse drop-shadow-[0_0_30px_rgba(255,119,0,0.9)]">🔥</div>
        </div>

        <div class="relative w-full h-full flex flex-col md:flex-row p-8 md:p-16 gap-12 z-10 pt-24">
            
            <div class="flex-grow relative flex justify-center items-end pb-40">
                <div class="absolute bottom-48 flex gap-48 w-full justify-center">
                    <div id="bubble-buzz" class="comic-bubble bubble-buzz bg-white text-slate-900 p-6 rounded-[40px] rounded-bl-none max-w-[280px] text-lg font-bold"></div>
                    <div id="bubble-owner" class="comic-bubble bubble-owner bg-[#2563eb] text-white p-6 rounded-[40px] rounded-bl-none max-w-[280px] text-lg font-bold"></div>
                </div>
            </div>

            <div class="w-full md:w-[480px] bg-slate-950/50 backdrop-blur-xl border border-white/10 rounded-[60px] p-10 flex flex-col pointer-events-auto shadow-2xl">
                <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                    <div class="flex items-center gap-3">
                        <i data-lucide="message-square" class="text-amber-500 w-6 h-6"></i>
                        <h3 class="text-xs font-black text-slate-300 uppercase tracking-widest">Lounge Archive</h3>
                    </div>
                    <button id="close-lounge" class="p-3 hover:bg-red-500/20 rounded-full transition-colors"><i data-lucide="log-out" class="w-5 h-5 text-slate-400 hover:text-red-500"></i></button>
                </div>
                
                <div id="chat-log" class="flex-grow overflow-y-auto space-y-6 custom-scroll pr-3 mb-8"></div>
                
                <form id="chat-form" class="relative">
                    <input type="text" id="chat-input" placeholder="메시지를 전송하세요..." class="w-full py-5 pl-8 pr-16 bg-white/5 border border-white/10 rounded-[30px] text-white outline-none focus:border-amber-500">
                    <button type="submit" class="absolute right-5 top-1/2 -translate-y-1/2 text-amber-500 hover:scale-110 transition-transform"><i data-lucide="send" class="w-6 h-6"></i></button>
                </form>

                <div class="grid grid-cols-3 gap-3 mt-8">
                    <button class="py-4 bg-white text-black rounded-[25px] text-[10px] font-black uppercase hover:bg-amber-500 transition-colors">친구 초대</button>
                    <button class="py-4 bg-white/5 border border-white/10 text-white rounded-[25px] text-[10px] font-black uppercase hover:bg-white/10 transition-colors">룸 꾸미기</button>
                    <button class="py-4 bg-white/5 border border-white/10 text-white rounded-[25px] text-[10px] font-black uppercase hover:bg-white/10 transition-colors">설정</button>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 left-10 right-10 md:right-auto md:w-[500px] z-50 player-bar">
            <div class="bg-slate-900/90 backdrop-blur-3xl border border-white/10 p-5 rounded-[40px] flex items-center justify-between shadow-2xl">
                <div class="flex items-center gap-5">
                    <div id="track-art-cover" class="w-14 h-14 bg-gradient-to-tr from-amber-500 to-orange-700 rounded-[16px] flex items-center justify-center text-white shadow-2xl">
                        <i data-lucide="music" style="width: 24px;"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-1">AppVerze Radio</p>
                        <p class="text-sm font-black text-white">Lounge Midnight Lo-fi</p>
                    </div>
                </div>
                <div class="flex items-center gap-5 pr-2">
                    <button id="play-pause-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-all">
                        <i data-lucide="play" id="play-pause-icon" style="width: 20px;"></i>
                    </button>
                    <i data-lucide="skip-forward" class="text-slate-500 hover:text-white cursor-pointer" style="width: 20px;"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 아이콘 초기화
        lucide.createIcons();

        // 상태 관리
        const state = {
            chatLog: [{ role: 'assistant', name: '버즈', text
