<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - GLOBAL CORE</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0f;
      color: white;
      font-family: 'Pretendard', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .site-background-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.34;
      pointer-events: none;
      filter: saturate(1.05) brightness(0.5);
    }
    .site-background-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(20, 24, 44, 0.18) 0%, rgba(6, 8, 14, 0.68) 68%, rgba(2, 3, 7, 0.84) 100%),
        linear-gradient(to bottom, rgba(5, 6, 12, 0.62), rgba(5, 6, 12, 0.78));
    }

    /* 🚀 홀로그램 룸 */
    #holodeck {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050508;
      perspective: 1000px;
      opacity: 0;
      z-index: 1;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
      overflow: hidden;
    }
    .grid-floor {
      position: absolute;
      bottom: -80%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(rgba(168, 85, 247, 0.7) 2px, transparent 2px),
        linear-gradient(90deg, rgba(168, 85, 247, 0.7) 2px, transparent 2px);
      background-size: 80px 80px;
      transform: rotateX(80deg);
      animation: gridMove 2s linear infinite;
    }
    .fade-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #050508 30%, transparent 100%);
      z-index: 2;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 80px; }
    }

    header, main {
      position: relative;
      z-index: 10;
      pointer-events: auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      z-index: 220; /* 전광판보다 위에서 클릭되도록 */
    }
    .logo {
      color: white;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
    }
    .logo-mark {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      height: 58px;
      perspective: 700px;
      animation: logoFloat 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .logo-globe-wrap {
      position: relative;
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      transform-origin: center center;
    }
    .logo-globe-shadow {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 2px;
      height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.15) 72%, transparent 100%);
      filter: blur(2px);
      opacity: 0.9;
      pointer-events: none;
    }
    .logo-ring {
      position: absolute;
      left: -3px;
      top: 21px;
      width: 64px;
      height: 18px;
      border-radius: 50%;
      border-bottom: 3px solid rgba(214, 227, 236, 0.96);
      border-left: 2px solid rgba(214, 227, 236, 0.8);
      border-right: 2px solid rgba(214, 227, 236, 0.8);
      border-top: 0;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.18),
        0 0 4px rgba(255, 255, 255, 0.15);
      transform: rotate(-22deg);
      opacity: 0.98;
      pointer-events: none;
      z-index: 4;
    }
    .logo-ring::before {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      top: 2px;
      bottom: -2px;
      border-radius: 50%;
      border-bottom: 2px solid rgba(255, 255, 255, 0.9);
      border-left: 1px solid transparent;
      border-right: 1px solid transparent;
      border-top: 0;
      opacity: 0.92;
    }
    .logo-globe {
      position: absolute;
      inset: 2px 4px 6px 4px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(166, 250, 255, 0.98) 0%, rgba(97, 221, 234, 0.92) 18%, rgba(21, 128, 150, 0.95) 46%, rgba(5, 52, 70, 0.98) 76%, rgba(1, 18, 30, 1) 100%);
      box-shadow:
        inset -12px -14px 22px rgba(0, 0, 0, 0.38),
        inset 10px 8px 18px rgba(255, 255, 255, 0.16),
        0 6px 18px rgba(34, 211, 238, 0.24);
      overflow: hidden;
      transform-style: preserve-3d;
      z-index: 2;
      animation: logoGlow 3s ease-in-out infinite alternate, globeSpin 6s linear infinite;
    }
    .logo-globe::before {
      content: "";
      position: absolute;
      inset: -10% -30%;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(186, 250, 255, 0.0) 0 6px,
          rgba(154, 241, 255, 0.5) 6px 7px,
          rgba(186, 250, 255, 0.0) 7px 16px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(186, 250, 255, 0.0) 0 8px,
          rgba(154, 241, 255, 0.18) 8px 9px,
          rgba(186, 250, 255, 0.0) 9px 18px
        );
      opacity: 0.65;
      animation: globeSurfaceSpin 3.2s linear infinite;
    }
    .logo-globe::after {
      content: "";
      position: absolute;
      inset: 5px 8px 20px 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.72), rgba(255,255,255,0.08) 42%, transparent 58%);
      transform: rotate(-16deg);
      pointer-events: none;
    }
    .logo-wordmark {
      display: inline-flex;
      align-items: center;
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      background: linear-gradient(180deg, #7ef9ff 0%, #39d0e0 18%, #12839f 58%, #0a4d62 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: logoGlow 3s ease-in-out infinite alternate;
      text-shadow:
        0 2px 0 rgba(16, 52, 66, 0.85),
        0 8px 18px rgba(0, 0, 0, 0.32);
    }
    .logo-wordmark .accent {
      color: #8ef7ff;
      -webkit-text-stroke: 1px rgba(4, 33, 43, 0.55);
    }
    .logo:hover .logo-mark {
      animation-play-state: paused;
      transform: scale(1.04);
    }
    .logo:hover .logo-globe-wrap,
    .logo:hover .logo-globe,
    .logo:hover .logo-globe::before {
      animation-play-state: paused;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes logoGlow {
      0% { filter: drop-shadow(0 6px 18px rgba(34, 211, 238, 0.18)); }
      100% { filter: drop-shadow(0 8px 24px rgba(34, 211, 238, 0.38)); }
    }
    @keyframes globeSpin {
      0% { transform: rotateX(18deg) rotateY(-16deg) rotateZ(0deg); }
      100% { transform: rotateX(18deg) rotateY(-16deg) rotateZ(360deg); }
    }
    @keyframes globeSurfaceSpin {
      0% { transform: translateX(0) rotate(0deg); }
      100% { transform: translateX(22px) rotate(0deg); }
    }
    .nav-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    /* 글로벌 언어 스위치 버튼 */
    .lang-btn {
      padding: 10px 15px;
      border-radius: 30px;
      background-color: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .lang-btn:hover {
      background-color: rgba(255,255,255,0.2);
    }

    .login-btn {
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      background-color: #a855f7;
      color: white;
      border: 1px solid #a855f7;
    }
    .auth-status {
      font-size: 0.75rem;
      color: #d1d5db;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auth-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    .auth-modal.open {
      display: flex;
    }
    .auth-modal-panel {
      width: 92%;
      max-width: 420px;
      background: #0f1118;
      border: 1px solid rgba(168, 85, 247, 0.45);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      padding: 20px;
      max-height: 86vh;
      overflow-y: auto;
    }
    .auth-modal-title {
      margin: 0 0 14px 0;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .auth-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #30364a;
      background: #171b26;
      color: #fff;
      outline: none;
    }
    .auth-input:focus {
      border-color: #a855f7;
    }
    .auth-help {
      color: #9ca3af;
      font-size: 0.78rem;
      margin-bottom: 12px;
    }
    .auth-error {
      color: #fca5a5;
      font-size: 0.82rem;
      min-height: 1.1em;
      margin-bottom: 10px;
    }
    .auth-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .auth-btn {
      border: 1px solid #3b4258;
      background: #222838;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .auth-btn.primary {
      border-color: #a855f7;
      background: #a855f7;
    }
    .oauth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .oauth-btn {
      border: 1px solid #3b4258;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .oauth-btn.kakao {
      background: #fee500;
      color: #1f1f1f;
      border-color: #fee500;
    }
    .oauth-btn.naver {
      background: #03c75a;
      color: #ffffff;
      border-color: #03c75a;
    }
    @media (max-width: 560px) {
      .auth-actions {
        flex-direction: column;
      }
      .oauth-actions {
        grid-template-columns: 1fr;
      }
    }

    /* 전광판 */
    .billboard {
      position: fixed;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 30px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.5);
      border-radius: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 25px;
      z-index: 100;
      white-space: nowrap;
      pointer-events: none; /* 헤더 버튼 클릭 가로채기 방지 */
    }
    .billboard-title {
      font-size: 0.8rem;
      color: #ccc;
      letter-spacing: 1px;
      font-weight: bold;
      margin: 0;
    }
    .billboard-title span {
      color: #a855f7;
    }
    .billboard-data {
      display: flex;
      gap: 25px;
      align-items: center;
    }
    .data-box {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 8px;
    }
    .data-label {
      font-size: 0.7rem;
      color: #888;
    }
    .data-value {
      font-size: 1.1rem;
      font-weight: 900;
      font-family: monospace;
    }
    .user-val { color: #38bdf8; }
    .ai-val { color: #c084fc; }
    .price-val { color: #fbbf24; }
    .pulse {
      animation: pulseGold 2s infinite;
    }
    @keyframes pulseGold {
      0% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
      50% { text-shadow: 0 0 20px rgba(251, 191, 36, 0.8); }
      100% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .title {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 20px;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    .title .dot {
      color: #fbbf24;
    }

    .input-wrapper {
      position: relative;
      width: 500px;
      max-width: 90%;
      transition: transform 1.5s ease;
      z-index: 20;
    }
    input[type="text"] {
      width: 100%;
      padding: 20px 30px;
      border-radius: 40px;
      border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }
    .submit-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 35px;
      height: 35px;
      background-color: #fbbf24;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
    .sound-presets {
      margin-top: 18px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .preset-note {
      font-size: 0.82rem;
      color: #d8b4fe;
      text-align: center;
      line-height: 1.5;
      padding: 0 8px;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .preset-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 19, 29, 0.88);
      color: white;
      border-radius: 16px;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(10px);
    }
    .preset-card:hover {
      transform: translateY(-2px);
      border-color: rgba(168, 85, 247, 0.55);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }
    .preset-title {
      display: block;
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .preset-subtitle {
      display: block;
      font-size: 0.74rem;
      color: #cbd5e1;
      line-height: 1.45;
    }
    .image-generation-status {
      min-height: 1.2em;
      font-size: 0.82rem;
      color: #fbbf24;
      text-align: center;
    }
    .generated-gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .generated-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 19, 29, 0.88);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.18);
    }
    .generated-card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      background: #0f1118;
    }
    .generated-card-body {
      padding: 12px;
    }
    .generated-card-title {
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .generated-card-text {
      font-size: 0.74rem;
      color: #cbd5e1;
      line-height: 1.45;
    }
    @media (max-width: 720px) {
      .preset-grid {
        grid-template-columns: 1fr;
      }
      .generated-gallery {
        grid-template-columns: 1fr;
      }
    }

    #chatContainer {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    .msg-wrapper {
      display: flex;
      gap: 15px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s forwards;
    }
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ai-video-box {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background-color: #111;
      flex-shrink: 0;
      border: 3px solid #a855f7;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }
    .ai-video-box video,
    .ai-video-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .yang-video-box {
      border-color: #fbbf24;
      box-shadow: 0 0 20px rgba(251,191,36,0.4);
    }

    .ai-message {
      padding: 15px 20px;
      border-radius: 0 12px 12px 12px;
      color: white;
      font-size: 1.1rem;
      backdrop-filter: blur(15px);
      background: rgba(20, 20, 25, 0.85);
      line-height: 1.6;
      border: 1px solid rgba(255,255,255,0.1);
      flex: 1;
    }
    .ai-message.playable-message {
      cursor: pointer;
      border-color: rgba(251, 191, 36, 0.45);
      box-shadow: 0 0 0 1px rgba(251, 191, 36, 0.08);
    }
    .ai-message.playable-message:hover {
      border-color: rgba(251, 191, 36, 0.72);
      background: rgba(28, 22, 12, 0.92);
    }
    .play-hint {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.82rem;
      color: #fbbf24;
      font-weight: 700;
    }
    #loadingText {
      display: none;
      position: absolute;
      top: -30px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #fbbf24;
      font-weight: bold;
      font-size: 0.9rem;
      animation: blink 1s infinite;
      text-shadow: 0 0 10px rgba(251,191,36,0.8);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <video class="site-background-video" autoplay muted loop playsinline>
    <source src="/Celestial.mp4" type="video/mp4">
  </video>
  <div class="site-background-overlay"></div>
  <div id="holodeck">
    <div class="fade-cover"></div>
    <div class="grid-floor"></div>
  </div>

  <!-- 3D 룸 배경 음악 -->
  <audio id="holodeckMusic" loop preload="auto">
    <source src="https://upload.wikimedia.org/wikipedia/commons/4/45/Beethoven_Moonlight_1st_movement.ogg" type="audio/ogg">
  </audio>

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span id="boardEcosystem">ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box">
        <span class="data-label" id="labelHuman">HUMAN USERS</span>
        <span class="data-value user-val" id="userCounter">15,420</span>
      </div>
      <div class="data-box">
        <span class="data-label" id="labelNodes">AI NODES</span>
        <span class="data-value ai-val" id="aiCounter">1,204,530</span>
      </div>
      <div class="data-box">
        <span class="data-label" id="labelValue">APV VALUE</span>
        <span class="data-value price-val pulse" id="valueCounter">$ 1.0024</span>
      </div>
    </div>
  </div>

  <header>
    <a href="index.html" class="logo" id="appverze">
      <span class="logo-mark">
        <span class="logo-globe-wrap" aria-hidden="true">
          <span class="logo-globe-shadow"></span>
          <span class="logo-ring"></span>
          <span class="logo-globe"></span>
        </span>
        <span class="logo-wordmark">APPVERZ<span class="accent">E</span></span>
      </span>
    </a>
    <div class="nav-buttons">
      <span class="auth-status" id="authStatus"></span>
      <button class="lang-btn" id="langToggleBtn" onclick="toggleLanguage()">🌐 KO</button>
      <button class="login-btn" id="loginBtn">LOGIN</button>
    </div>
  </header>

  <div class="auth-modal" id="authModal">
    <div class="auth-modal-panel">
      <h3 class="auth-modal-title">APPVERZE 로그인</h3>
      <input id="authEmail" class="auth-input" type="email" placeholder="이메일" autocomplete="email">
      <input id="authPassword" class="auth-input" type="password" placeholder="비밀번호" autocomplete="current-password">
      <div class="auth-help">EMAIL LOGIN / JOIN 버튼 하나로 가입 또는 로그인을 진행합니다.</div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-actions">
        <button class="auth-btn" id="authCancelBtn" type="button">닫기</button>
        <button class="auth-btn primary" id="authSubmitBtn" type="button">EMAIL LOGIN / JOIN</button>
      </div>
      <div class="oauth-actions">
        <button class="oauth-btn kakao" id="kakaoLoginBtn" type="button">카카오 로그인</button>
        <button class="oauth-btn naver" id="naverLoginBtn" type="button">네이버 로그인</button>
      </div>
    </div>
  </div>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>

    function setAuthBusy(isBusy) {
      authSubmitBtn.disabled = isBusy;
      kakaoLoginBtn.disabled = isBusy;
      naverLoginBtn.disabled = isBusy;
    }

    function playHolodeckMusic() {
      if (!holodeckMusic) return;
      holodeckMusic.volume = 0.45;
      const p = holodeckMusic.play();
      if (p && typeof p.then === 'function') {
        p.catch(() => {
          // 브라우저 자동재생 정책으로 막혀도 조용히 무시
        });
      }
    }

    function speakWelcome() {
      if (!('speechSynthesis' in window)) return;
      try {
        const utter = new SpeechSynthesisUtterance(WELCOME_TTS_TEXT);
        utter.lang = 'en-US';
        utter.rate = 1.0;
        utter.volume = 1.0;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utter);
      } catch (e) {
        // ignore TTS errors silently
      }
    }

    function speakYangRoom(text) {
      if (!('speechSynthesis' in window)) return;
      try {
        const utter = new SpeechSynthesisUtterance(text);
        const langCode = currentLang === 'KO' ? 'ko-KR' : 'en-US';
        utter.lang = langCode;
        utter.rate = 1.0;
        utter.volume = 1.0;

        // Try to pick a male-sounding voice for Yang
        const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
        if (voices && voices.length) {
          const candidates = voices.filter(function (v) {
            return v.lang && v.lang.startsWith(langCode);
          });
          const malePreferred = candidates.find(function (v) {
            const name = (v.name || '').toLowerCase();
            return name.includes('male') || name.includes('guy') || name.includes('joon') || name.includes('han');
          });
          utter.voice = malePreferred || candidates[0] || voices[0];
        }

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utter);
      } catch (e) {
        // ignore TTS errors silently
      }
    }

      try {

        // Try to pick a female-sounding voice for Yin

          const femalePreferred = candidates.find(function (v) {

            return name.includes('female') || name.includes('woman') || name.includes('girl') || name.includes('sun') || name.includes('hi') || name.includes('susan') || name.includes('sara');
          });
          utter.voice = femalePreferred || candidates[0] || voices[0];

    function setAuthError(message) {
      authError.textContent = message || '';
    }

    function openAuthModal() {
      setAuthBusy(false);
      setAuthError('');
      authModal.classList.add('open');
      setTimeout(() => authEmail.focus(), 0);
    }

    function closeAuthModal() {
      setAuthBusy(false);
      authModal.classList.remove('open');
      setAuthError('');
    }

    function updateAuthUI(session) {
      currentSession = session;
      const user = session?.user;
      if (user) {
        loginBtn.textContent = 'LOGOUT';
        authStatus.textContent = user.email || '';
      } else {
        loginBtn.textContent = 'LOGIN';
        authStatus.textContent = '';
      }
    }

    async function initSupabaseAuth() {
      try {
        const cfgRes = await fetch('/api/supabase-config');
        if (!cfgRes.ok) throw new Error('supabase-config endpoint unavailable');
        const cfg = await cfgRes.json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('Supabase config missing');
        supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

        const { data } = await supabaseClient.auth.getSession();
        updateAuthUI(data?.session || null);

        supabaseClient.auth.onAuthStateChange((_event, session) => {
          updateAuthUI(session || null);
        });
      } catch (e) {
        console.error('Supabase init failed:', e);
      }
    }

    async function handleEmailAuth() {
      if (!supabaseClient) {
        setAuthError('로그인 서버 설정을 확인해주세요.');
        return;
      }

      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        setAuthError('이메일과 비밀번호를 입력해주세요.');
        return;
      }

      setAuthBusy(true);
      setAuthError('');

      try {
        // 1) 먼저 로그인 시도
        const signInRes = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (!signInRes.error && signInRes.data?.session) {
          closeAuthModal();
          return;
        }

        // 2) 로그인 실패 시 가입 시도
        const signUpRes = await supabaseClient.auth.signUp({
          email,
          password,
        });

        if (signUpRes.error) {
          throw signUpRes.error;
        }

        // 이메일 인증이 켜져 있으면 세션이 없을 수 있음 (정상)
        if (!signUpRes.data?.session) {
          setAuthError('가입 완료! 이메일 인증 후 다시 로그인해주세요.');
          return;
        }

        closeAuthModal();
      } catch (err) {
        console.error(err);
        setAuthError(err?.message || '로그인 중 오류가 발생했습니다.');
      } finally {
        setAuthBusy(false);
      }
    }

    // D-ID 실패 시에도 3D 룸을 보여주는 폴백 메시지
    function appendFallbackMessage(name, imgSrc, boxClass, textToSay, triggerHolodeck) {
      const msgWrapper = document.createElement('div');
      msgWrapper.className = 'msg-wrapper';
      msgWrapper.innerHTML = `
        <div class="ai-video-box ${boxClass}">
          <img src="${imgSrc}" alt="${name}">
        </div>
        <div class="ai-message"><strong>${name}:</strong> ${textToSay}</div>
      `;
      chatBox.appendChild(msgWrapper);

      if (triggerHolodeck) {
        title.style.opacity = '0';
        holodeck.style.opacity = '1';
        searchBox.style.transform = 'translateY(150px)';
        playHolodeckMusic();
      }
    }

    function appendPlayableTrackMessage(name, imgSrc, boxClass, textToSay, videoSrc) {
      title.style.opacity = '0';
      searchBox.style.transform = 'translateY(150px)';

      // Remove previous playable track messages (video/icon) so only the latest shows
      chatBox.querySelectorAll('.msg-wrapper.playable-track-msg').forEach(function (el) { el.remove(); });

      const msgWrapper = document.createElement('div');
      msgWrapper.className = 'msg-wrapper playable-track-msg';
      msgWrapper.innerHTML = `
        <div class="ai-video-box ${boxClass}">
          <video src="${videoSrc}" autoplay controls playsinline></video>
        </div>
        <div class="ai-message">
          <strong>${name}:</strong><br>${textToSay.replace(/\n/g, '<br>')}
        </div>
      `;

      chatBox.appendChild(msgWrapper);
    }

    // Vercel 보안 백엔드 통신 함수
    async function addRealVideoMessage(name, imgSrc, boxClass, textToSay, voiceId, triggerHolodeck) {
      const langData = i18n[currentLang];
      loadingText.style.display = 'block';
      inputField.disabled = true;

      try {
        const createRes = await fetch('/api/did', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            script: {
              type: 'text',
              input: textToSay,
              provider: { type: 'microsoft', voice_id: voiceId }
            },
            source_url: imgSrc
          })
        });

        if (!createRes.ok) {
          // 서버 쪽 문제면 바로 폴백
          throw new Error('D-ID create failed');
        }

        const createData = await createRes.json();
        const talkId = createData.id;

        if (!talkId) {
          throw new Error('Missing talk id');
        }

        let videoUrl = null;
        while (!videoUrl) {
          await new Promise(resolve => setTimeout(resolve, 2000));
          const checkRes = await fetch(`/api/did?id=${talkId}`);
          const checkData = await checkRes.json();

          if (checkData.status === 'done') {
            videoUrl = checkData.result_url;
          } else if (checkData.status === 'error') {
            throw new Error('Render failed');
          }
        }

        loadingText.style.display = 'none';
        inputField.disabled = false;
        inputField.focus();

        if (videoUrl) {
          const msgWrapper = document.createElement('div');
          msgWrapper.className = 'msg-wrapper';
          msgWrapper.innerHTML = `
            <div class="ai-video-box ${boxClass}">
              <video src="${videoUrl}" autoplay controls></video>
            </div>
            <div class="ai-message"><strong>${name}:</strong> ${textToSay}</div>
          `;
          chatBox.appendChild(msgWrapper);

          if (triggerHolodeck) {
            title.style.opacity = '0';
            holodeck.style.opacity = '1';
            searchBox.style.transform = 'translateY(150px)';
            playHolodeckMusic();
          }
        }
      } catch (error) {
        console.error(error);
        // 어떤 에러가 나도 알림 대신 폴백 렌더링
        const langData = i18n[currentLang];
        const fallbackText = triggerHolodeck
          ? langData.replyYang
          : langData.replyYin;
        const img = triggerHolodeck ? YANG_IMAGE : YIN_IMAGE;
        const boxClass = triggerHolodeck ? 'yang-video-box' : '';
        appendFallbackMessage(name, img, boxClass, fallbackText, triggerHolodeck);
      } finally {
        loadingText.style.display = 'none';
        inputField.disabled = false;
      }
    }

    function triggerChat() {
      if (inputField.value.trim() === '') return;

      const userText = inputField.value;
      inputField.value = '';
      chatBox.innerHTML = '';

      const langData = i18n[currentLang];

      if (userText.includes('방') || userText.includes('룸') || userText.toLowerCase().includes('room')) {
        // 사용자 입력 이벤트 체인 안에서 즉시 재생 시도 (자동재생 및 TTS)
        playHolodeckMusic();
        appendFallbackMessage(
          'Yang (Execute)',
          YANG_IMAGE,
          'yang-video-box',
          langData.replyYang,
          true
        );
        speakYangRoom(langData.replyYang);
      } else {
        title.style.opacity = '0';
        searchBox.style.transform = 'translateY(150px)';
        appendFallbackMessage(
          'Yin (Emotion)',
          YIN_IMAGE,
          '',
          langData.replyYin,
          false
        );
        speakYinEmotion(langData.replyYin);
      }
    }

    inputField.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') triggerChat();
    });
    submitBtn.addEventListener('click', triggerChat);

    loginBtn.addEventListener('click', async function () {
      if (currentSession && supabaseClient) {
        await supabaseClient.auth.signOut();
        return;
      }
      openAuthModal();
    });
    authCancelBtn.addEventListener('click', closeAuthModal);
    authSubmitBtn.addEventListener('click', handleEmailAuth);
    kakaoLoginBtn.addEventListener('click', function () {
      closeAuthModal();
      window.location.assign(KAKAO_LOGIN_URL);
    });
    naverLoginBtn.addEventListener('click', function () {
      closeAuthModal();
      window.location.assign(NAVER_LOGIN_URL);
    });
    authModal.addEventListener('click', function (e) {
      if (e.target === authModal) closeAuthModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && authModal.classList.contains('open')) {
        closeAuthModal();
      }
    });
    authPassword.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleEmailAuth();
    });
    presetCards.forEach(function (card) {
      card.addEventListener('click', function () {
        inputField.value = card.dataset.prompt || '';
        inputField.focus();
        if (card.dataset.trackSrc) {
          var msgMap = { '/Ascent.mp4': FANTASTIC_MAGICAL_MESSAGE, '/Chrono.mp4': BIZARRE_UNCANNY_MESSAGE, '/Resonance.mp4': MYSTERIOUS_CORE_MESSAGE };
          var trackMsg = msgMap[card.dataset.trackSrc] || DREAMY_LOUNGE_MESSAGE;
          appendPlayableTrackMessage('APPVERZE Sound', YIN_IMAGE, '', trackMsg, card.dataset.trackSrc);
        }
      });
    });

    // Speak a short welcome line on first user interaction (autoplay-safe)
    (function () {
      let welcomed = false;
      function handleFirstInteraction() {
        if (welcomed) return;
        welcomed = true;
        speakWelcome();
        window.removeEventListener('click', handleFirstInteraction);
        window.removeEventListener('keydown', handleFirstInteraction);
      }
      window.addEventListener('click', handleFirstInteraction);
      window.addEventListener('keydown', handleFirstInteraction);
    })();

    initSupabaseAuth();
  </script>
</body>
</html>
