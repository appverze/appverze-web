<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <link rel="preload" as="image" href="studio-bg.svg">
  <link rel="preload" as="image" href="studio-desk.svg">
  <link rel="preload" as="image" href="studio-chair-left.svg">
  <link rel="preload" as="image" href="studio-chair-right.svg">
  <link rel="preload" as="image" href="studio-camera-main.svg">
  <link rel="preload" as="image" href="studio-camera-back.svg">
  <link rel="preload" as="image" href="studio-microphone.svg">
  <link rel="preload" as="image" href="studio-mixer.svg">
  <link rel="preload" as="image" href="studio-male.svg">
  <link rel="preload" as="image" href="studio-female.svg">
  <link rel="preload" as="image" href="lounge-hub.svg">
  <link rel="preload" as="image" href="shopping-mall.svg">
  <link rel="preload" as="image" href="shopping-character-roblox.svg">
  <link rel="preload" as="image" href="game-dev.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }

    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0f;
      color: white;
      font-family: 'Pretendard', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =========================================
       진짜 스튜디오 사진을 띄우는 설정!
       ========================================= */
    #studioBgImage, #studioDeskImage, #studioChairLeftImage, #studioChairRightImage,
    #studioCameraMainImage, #studioCameraBackImage, #studioMicrophoneImage, #studioMixerImage,
    #studioMaleImage, #studioFemaleImage,
    #loungeImage, #shoppingImage, #shoppingCharacterRobloxImage, #gameDevImage {
      position: fixed;
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      object-fit: cover;
      opacity: 0;
      visibility: hidden;
      z-index: 1;
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
      pointer-events: none;
    }
    #studioBgImage.show, #studioDeskImage.show, #studioChairLeftImage.show, #studioChairRightImage.show,
    #studioCameraMainImage.show, #studioCameraBackImage.show, #studioMicrophoneImage.show, #studioMixerImage.show,
    #studioMaleImage.show, #studioFemaleImage.show,
    #loungeImage.show, #shoppingImage.show, #shoppingCharacterRobloxImage.show, #gameDevImage.show {
      opacity: 0.85;
      visibility: visible;
    }
    /* 방송국 배경 */
    #studioBgImage.show {
      animation: studioFloat 6s ease-in-out infinite;
    }
    #studioBgImage { z-index: 1; }
    #studioDeskImage, #studioChairLeftImage, #studioChairRightImage, #studioCameraBackImage, #studioMicrophoneImage, #studioMixerImage { z-index: 2; }
    #studioCameraMainImage { z-index: 3; }
    #studioMaleImage, #studioFemaleImage { z-index: 4; }
    #studioMaleImage.show, #studioFemaleImage.show { opacity: 1; }

    /* 메인 카메라 레이어를 화면 좌측 기준으로 */
    #studioCameraMainImage {
      object-position: left center;
    }

    /* 스튜디오 남/여 아바타 코너 라벨 */
    .corner-label {
      position: fixed;
      top: 20px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.8);
      color: #e5e7eb;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(148, 163, 184, 0.5);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease, transform 0.4s ease;
      transform: translateY(-6px);
      pointer-events: none;
    }
    .corner-label.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    #studioMaleLabel {
      left: 20px;
    }
    #studioFemaleLabel {
      right: 20px;
    }
    @keyframes studioFloat {
      0%, 100% { transform: scale(1) translate(0, 0); }
      50% { transform: scale(1.02) translate(0, -0.5%); }
    }
    /* 화면 위로 올라올 내용물들 */
    header, main {
      position: relative;
      z-index: 10;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
    }
    .logo { 
      font-size: 1.5rem; 
      font-weight: 900; 
      letter-spacing: 2px; 
      text-decoration: none;
      color: white;
      cursor: pointer;
    }
    .logo span { color: #fbbf24; }
    
    .lounge-btn {
      padding: 10px 20px;
      border-radius: 30px;
      background-color: white;
      color: black;
      font-weight: bold;
      text-decoration: none;
      font-size: 0.9rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .title {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 40px;
      opacity: 1;
      transition: opacity 1.5s ease; 
    }
    .title.hidden { opacity: 0; }
    .title .dot { color: #fbbf24; }

    .input-wrapper {
      position: relative;
      width: 600px;
      max-width: 90%;
      transition: transform 1.5s ease; 
      z-index: 200;
    }
    
    input {
      width: 100%;
      padding: 20px 30px;
      border-radius: 40px;
      border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    input:focus { border-color: #555; background-color: rgba(255, 255, 255, 0.1); }
    input::placeholder { color: #777; text-align: center; }
    
    .submit-btn {
      position: absolute;
      right: 15px; top: 50%; transform: translateY(-50%);
      width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer;
    }

    .suggestions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      transition: opacity 0.5s ease;
      flex-wrap: wrap;
    }
    .suggestion-chip {
      padding: 8px 16px;
      border-radius: 30px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.85rem;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
    }
    .suggestion-chip:hover {
      background: rgba(255,255,255,0.15);
      border-color: #fbbf24;
    }

    #chatContainer {
      position: absolute;
      top: 10%; 
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 700px;
      max-height: 55vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
      pointer-events: auto;
      scrollbar-width: none;
      padding-bottom: 20px;
    }
    #chatContainer::-webkit-scrollbar {
      display: none;
    }

    .ai-message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 20px;
      border-radius: 15px;
      color: white;
      font-size: 1rem;
      backdrop-filter: blur(20px);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s forwards;
      line-height: 1.5;
    }

    .yin-msg { 
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(20, 20, 25, 0.85));
      border: 1px solid rgba(168, 85, 247, 0.3);
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); 
    }
    .yang-msg { 
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(20, 20, 25, 0.85));
      border: 1px solid rgba(251, 191, 36, 0.3);
      box-shadow: 0 10px 30px rgba(251, 191, 36, 0.2); 
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
      background-color: #222;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      margin-top: 2px;
      animation: avatarFloat 4s ease-in-out infinite;
    }
    .yin-msg .avatar { animation-delay: 0s; }
    .yang-msg .avatar { animation-delay: 0.5s; }
    .avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    @keyframes avatarFloat {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.08) translateY(-3px); }
    }
    .msg-content {
      flex: 1;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <img id="studioBgImage" src="studio-bg.svg" alt="Studio Background">
  <img id="studioDeskImage" src="studio-desk.svg" alt="Studio Desk">
  <img id="studioChairLeftImage" src="studio-chair-left.svg" alt="Studio Left Chair">
  <img id="studioChairRightImage" src="studio-chair-right.svg" alt="Studio Right Chair">
  <img id="studioCameraMainImage" src="studio-camera-main.svg" alt="Studio Main Camera">
  <img id="studioCameraBackImage" src="studio-camera-back.svg" alt="Studio Back Camera">
  <img id="studioMicrophoneImage" src="studio-microphone.svg" alt="Studio Microphone">
  <img id="studioMixerImage" src="studio-mixer.svg" alt="Studio Mixer">
  <img id="studioMaleImage" src="studio-male.svg" alt="Studio Male Avatar">
  <img id="studioFemaleImage" src="studio-female.svg" alt="Studio Female Avatar">
  <img id="loungeImage" src="lounge-hub.svg" alt="Lounge Hub">
  <img id="shoppingImage" src="shopping-mall.svg" alt="Shopping Mall">
  <img id="shoppingCharacterRobloxImage" src="shopping-character-roblox.svg" alt="Shopping Roblox Character">
  <img id="gameDevImage" src="game-dev.svg" alt="Game Dev Studio">

  <div id="studioMaleLabel" class="corner-label">STUDIO MALE AVATAR</div>
  <div id="studioFemaleLabel" class="corner-label">STUDIO FEMALE AVATAR</div>

  <header>
    <a href="index.html" class="logo">APPVERZE<span>.</span></a>
    <a href="#" class="lounge-btn">LOUNGE HUB</a>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="안녕 친구야 취향에 맞게 방송국, 쇼핑몰, 게임 제작소 제작을 요청해 보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>

    <div class="suggestions" id="suggestionsBox">
      <div class="suggestion-chip" onclick="document.getElementById('chatInput').value='연인과 최근에 자주 다투는데 어떻게 관계를 회복할 수 있을까요?'; document.getElementById('submitBtn').click();">💕 AI 연인 관계 고민 나누기</div>
      <div class="suggestion-chip" onclick="document.getElementById('chatInput').value='친구와 오해가 생겨서 멀어졌는데 어떻게 풀면 좋을까요?'; document.getElementById('submitBtn').click();">🤝 친구 갈등 관계 정리하기</div>
      <div class="suggestion-chip" onclick="document.getElementById('chatInput').value='최근 주식 시장이 불안한데, 초보자는 어떤 방식으로 투자 방향을 잡는 것이 좋을까요?'; document.getElementById('submitBtn').click();">📈 주식 투자 전문가 상담</div>
      <div class="suggestion-chip" onclick="document.getElementById('chatInput').value='요즘 피로가 잘 안 풀리고 무기력한데, 건강한 라이프스타일을 위해 어떤 습관을 들이면 좋을까요?'; document.getElementById('submitBtn').click();">🧘 건강 및 라이프스타일 상담</div>
      <div class="suggestion-chip" onclick="document.getElementById('chatInput').value='앞으로의 진로가 고민인데, 어떤 방향으로 학습하고 준비해야 할지 조언해주세요.'; document.getElementById('submitBtn').click();">📚 학습 및 진로 교육 상담</div>
    </div>
  </main>

  <script>
    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const submitBtn = document.getElementById('submitBtn');
    const studioBgImage = document.getElementById('studioBgImage');
    const studioDeskImage = document.getElementById('studioDeskImage');
    const studioChairLeftImage = document.getElementById('studioChairLeftImage');
    const studioChairRightImage = document.getElementById('studioChairRightImage');
    const studioCameraMainImage = document.getElementById('studioCameraMainImage');
    const studioCameraBackImage = document.getElementById('studioCameraBackImage');
    const studioMicrophoneImage = document.getElementById('studioMicrophoneImage');
    const studioMixerImage = document.getElementById('studioMixerImage');
    const studioMaleImage = document.getElementById('studioMaleImage');
    const studioFemaleImage = document.getElementById('studioFemaleImage');
    const loungeImage = document.getElementById('loungeImage');
    const shoppingImage = document.getElementById('shoppingImage');
    const shoppingCharacterRobloxImage = document.getElementById('shoppingCharacterRobloxImage');
    const gameDevImage = document.getElementById('gameDevImage');
    const studioMaleLabel = document.getElementById('studioMaleLabel');
    const studioFemaleLabel = document.getElementById('studioFemaleLabel');
    const title = document.getElementById('mainTitle');
    const searchBox = document.getElementById('searchBox');
    const loungeBtn = document.querySelector('.lounge-btn');
    const studioSceneLayers = [
      studioBgImage,
      studioDeskImage,
      studioChairLeftImage,
      studioChairRightImage,
      studioCameraMainImage,
      studioCameraBackImage,
      studioMicrophoneImage,
      studioMixerImage,
      studioMaleImage,
      studioFemaleImage
    ];

    function showStudioScene() {
      studioSceneLayers.forEach((el) => el.classList.add('show'));
      if (studioMaleLabel) studioMaleLabel.classList.add('show');
      if (studioFemaleLabel) studioFemaleLabel.classList.add('show');
    }

    function hideStudioScene() {
      studioSceneLayers.forEach((el) => el.classList.remove('show'));
      if (studioMaleLabel) studioMaleLabel.classList.remove('show');
      if (studioFemaleLabel) studioFemaleLabel.classList.remove('show');
    }

    const yinAvatar = `<div class="avatar">
      <svg viewBox="0 0 100 100">
        <rect width="100" height="100" fill="#f3e8ff"/>
        <circle cx="50" cy="60" r="40" fill="#a855f7"/>
        <path d="M 10 60 Q 50 -20 90 60" fill="#581c87"/>
        <circle cx="35" cy="55" r="5" fill="#fff"/>
        <circle cx="65" cy="55" r="5" fill="#fff"/>
        <path d="M 42 70 Q 50 78 58 70" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="22" cy="65" r="6" fill="#d8b4fe"/>
        <circle cx="78" cy="65" r="6" fill="#d8b4fe"/>
      </svg>
    </div>`;
    
    const yangAvatar = `<div class="avatar">
      <svg viewBox="0 0 100 100">
        <rect width="100" height="100" fill="#fef3c7"/>
        <circle cx="50" cy="60" r="40" fill="#fbbf24"/>
        <path d="M 15 50 L 30 10 L 50 30 L 70 5 L 85 50 Z" fill="#78350f"/>
        <rect x="20" y="45" width="60" height="18" rx="8" fill="#1e1b4b"/>
        <circle cx="35" cy="54" r="4" fill="#fbbf24"/>
        <circle cx="65" cy="54" r="4" fill="#fbbf24"/>
        <path d="M 40 78 Q 50 80 65 72" stroke="#78350f" stroke-width="4" fill="none" stroke-linecap="round"/>
      </svg>
    </div>`;

    async function triggerAI() {
      if (inputField.value.trim() !== '') {
        const userText = inputField.value;
        inputField.value = '';
        chatBox.innerHTML = ''; 

        const suggestionsBox = document.getElementById('suggestionsBox');
        if(suggestionsBox) suggestionsBox.style.display = 'none';

        if(userText.includes('방송국')) {
          
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = yinAvatar + `<div class="msg-content"><strong>Yin (감성):</strong> 와! 대형 유트브 방송국이라니 너무 기대되요! 멋진 무대와 조명을 세팅해 드릴께요. 💜</div>`;
            chatBox.appendChild(yinMessage);
          }, 500);

          setTimeout(() => {
            const yangMessage = document.createElement('div');
            yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = yangAvatar + `<div class="msg-content"><strong>Yang (실행):</strong> 메인 무대, 관객석, 진행 테이블 구조 분석 완료. 3D 스튜디오 룸 데이터를 로드합니다. 이동합니다! ⚡</div>`;
            chatBox.appendChild(yangMessage);

            // 화면 전환 마법 (방송국 스튜디오 이미지 표시)
            setTimeout(() => {
              title.classList.add('hidden');
              loungeImage.classList.remove('show');
              shoppingImage.classList.remove('show');
              gameDevImage.classList.remove('show');
              showStudioScene();
              searchBox.style.transform = 'translateY(150px)';
            }, 1000);

          }, 2500);

        } else if(userText.includes('쇼핑몰')) {
          
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = yinAvatar + `<div class="msg-content"><strong>Yin (감성):</strong> 꺄! 쇼핑몰이라니 너무 설레요! 예쁜 상품들과 화사한 조명으로 라이브 커머스 스튜디오를 꾸며볼게요. 🛍️✨</div>`;
            chatBox.appendChild(yinMessage);
          }, 500);

          setTimeout(() => {
            const yangMessage = document.createElement('div');
            yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = yangAvatar + `<div class="msg-content"><strong>Yang (실행):</strong> 상품 진열대, 결제 시스템, 라이브 채팅창 연동 완료. 쇼핑몰 스튜디오 데이터를 로드합니다. 판매를 시작합니다! 💳</div>`;
            chatBox.appendChild(yangMessage);

            // 화면 전환 마법 (쇼핑몰 스튜디오 이미지 + Roblox 캐릭터 표시)
            setTimeout(() => {
              title.classList.add('hidden');
              hideStudioScene();
              loungeImage.classList.remove('show');
              gameDevImage.classList.remove('show');
              shoppingImage.classList.add('show');
              shoppingCharacterRobloxImage.classList.add('show');
              searchBox.style.transform = 'translateY(150px)';
            }, 1000);

          }, 2500);

        } else if(userText.includes('게임')) {
          
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = yinAvatar + `<div class="msg-content"><strong>Yin (감성):</strong> 우와! 게임 제작이라니 상상만 해도 신나요! 어떤 멋진 세계관을 만들지 기대되네요. 🎮✨</div>`;
            chatBox.appendChild(yinMessage);
          }, 500);

          setTimeout(() => {
            const yangMessage = document.createElement('div');
            yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = yangAvatar + `<div class="msg-content"><strong>Yang (실행):</strong> 게임 엔진 초기화, 에셋 로딩, 물리 엔진 세팅 완료. 개발 스튜디오 환경을 로드합니다. 코딩을 시작합니다! 💻</div>`;
            chatBox.appendChild(yangMessage);

            // 화면 전환 마법 (게임 제작소 스튜디오 이미지 표시)
            setTimeout(() => {
              title.classList.add('hidden');
              hideStudioScene();
              loungeImage.classList.remove('show');
              shoppingImage.classList.remove('show');
              shoppingCharacterRobloxImage.classList.remove('show');
              gameDevImage.classList.add('show');
              searchBox.style.transform = 'translateY(150px)';
            }, 1000);

          }, 2500);

        } else {
          // ChatGPT API 연동
          const loadingMsg = document.createElement('div');
          loadingMsg.className = 'ai-message';
          loadingMsg.style.background = 'rgba(255,255,255,0.1)';
          loadingMsg.innerHTML = `<div class="msg-content" style="text-align:center; width:100%;"><strong>AI가 당신의 고민을 깊이 생각하고 있습니다... 💭</strong></div>`;
          chatBox.appendChild(loadingMsg);

          try {
            // Vercel Serverless Function을 호출하도록 변경
            const response = await fetch('/api/chat', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ message: userText })
            });

            let data;
            try {
              data = await response.json();
            } catch (_) {
              throw new Error('서버 응답을 읽을 수 없습니다. (JSON 아님)');
            }
            
            if (!response.ok) {
              throw new Error(data.error || 'API 요청 실패');
            }

            const responseText = data.reply;
            
            chatBox.removeChild(loadingMsg);

            // [YIN] 과 [YANG] 텍스트 파싱
            const yinMatch = responseText.match(/\[YIN\]([\s\S]*?)(?:\[YANG\]|$)/i);
            const yangMatch = responseText.match(/\[YANG\]([\s\S]*)/i);

            // 정규식 매칭이 실패할 경우를 대비한 폴백 처리
            let yinText = "공감 중 오류가 발생했어요.";
            let yangText = "분석 중 오류가 발생했어요.";

            if (yinMatch && yinMatch[1]) {
              yinText = yinMatch[1].trim();
            } else if (!yangMatch) {
              // YIN/YANG 태그가 아예 없이 답변이 온 경우
              yinText = responseText;
              yangText = "어떤 상황인지 조금 더 자세히 말씀해 주시면, 제가 논리적으로 분석해 드릴게요! 💡";
            }

            if (yangMatch && yangMatch[1]) {
              yangText = yangMatch[1].trim();
            }

            setTimeout(() => {
              const yinMessage = document.createElement('div');
              yinMessage.className = 'ai-message yin-msg';
              yinMessage.innerHTML = yinAvatar + `<div class="msg-content"><strong>Yin (감성):</strong><br>${yinText.replace(/\n/g, '<br>')}</div>`;
              chatBox.appendChild(yinMessage);
            }, 300);

            setTimeout(() => {
              const yangMessage = document.createElement('div');
              yangMessage.className = 'ai-message yang-msg';
              yangMessage.innerHTML = yangAvatar + `<div class="msg-content"><strong>Yang (실행):</strong><br>${yangText.replace(/\n/g, '<br>')}</div>`;
              chatBox.appendChild(yangMessage);
              
              // 스크롤 맨 아래로
              chatBox.scrollTop = chatBox.scrollHeight;
            }, 1500);

          } catch (error) {
            chatBox.removeChild(loadingMsg);
            const errorMsg = document.createElement('div');
            errorMsg.className = 'ai-message';
            const detail = error.message || 'AI 서버와 연결할 수 없습니다. API 키나 네트워크 상태를 확인해주세요.';
            errorMsg.innerHTML = `<div class="msg-content"><strong>오류:</strong> ${detail.replace(/</g, '&lt;')}</div>`;
            chatBox.appendChild(errorMsg);
          }
        }
      }
    }

    inputField.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') triggerAI();
    });

    submitBtn.addEventListener('click', triggerAI);

    // LOUNGE HUB 버튼 클릭 이벤트
    loungeBtn.addEventListener('click', function(e) {
      e.preventDefault();
      
      // 입력창 초기화 및 채팅창 비우기
      inputField.value = '';
      chatBox.innerHTML = ''; 

      setTimeout(() => {
        const yinMessage = document.createElement('div');
        yinMessage.className = 'ai-message yin-msg';
        yinMessage.innerHTML = yinAvatar + `<div class="msg-content"><strong>Yin (감성):</strong> 환영합니다! 편안하게 휴식하며 대화할 수 있는 라운지 허브예요. 사이버펑크 시티뷰가 정말 멋지죠? ☕✨</div>`;
        chatBox.appendChild(yinMessage);
      }, 500);

      setTimeout(() => {
        const yangMessage = document.createElement('div');
        yangMessage.className = 'ai-message yang-msg';
        yangMessage.innerHTML = yangAvatar + `<div class="msg-content"><strong>Yang (실행):</strong> 라운지 허브 접속 완료. 네트워킹 및 정보 탐색에 최적화된 공간입니다. 무엇을 도와드릴까요? 🌐</div>`;
        chatBox.appendChild(yangMessage);

        // 화면 전환 마법 (라운지 허브 이미지 표시)
        setTimeout(() => {
          title.classList.add('hidden');
          hideStudioScene();
          shoppingImage.classList.remove('show');
          shoppingCharacterRobloxImage.classList.remove('show');
          gameDevImage.classList.remove('show');
          loungeImage.classList.add('show');
          searchBox.style.transform = 'translateY(150px)';
        }, 1000);

      }, 2500);
    });
  </script>
</body>
</html>
