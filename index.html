<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - GLOBAL CORE</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0f;
      color: white;
      font-family: 'Pretendard', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 🚀 홀로그램 룸 */
    #holodeck {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050508;
      perspective: 1000px;
      opacity: 0;
      z-index: 1;
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
      overflow: hidden;
    }
    .grid-floor {
      position: absolute;
      bottom: -80%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(rgba(168, 85, 247, 0.7) 2px, transparent 2px),
        linear-gradient(90deg, rgba(168, 85, 247, 0.7) 2px, transparent 2px);
      background-size: 80px 80px;
      transform: rotateX(80deg);
      animation: gridMove 2s linear infinite;
    }
    .fade-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #050508 30%, transparent 100%);
      z-index: 2;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 80px; }
    }

    header, main {
      position: relative;
      z-index: 10;
      pointer-events: auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      z-index: 220; /* 전광판보다 위에서 클릭되도록 */
    }
    .logo {
      color: white;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
    }
    .logo-mark {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      height: 58px;
      perspective: 700px;
      animation: logoFloat 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .logo-globe-wrap {
      position: relative;
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      animation: globeOrbit 4.8s ease-in-out infinite;
      transform-origin: center center;
    }
    .logo-globe-shadow {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 2px;
      height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.15) 72%, transparent 100%);
      filter: blur(2px);
      opacity: 0.9;
      pointer-events: none;
    }
    .logo-ring {
      position: absolute;
      left: -4px;
      top: 18px;
      width: 66px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid rgba(214, 227, 236, 0.92);
      box-shadow:
        inset 0 0 0 1px rgba(66, 82, 92, 0.35),
        0 2px 8px rgba(0, 0, 0, 0.18);
      transform: rotate(-22deg);
      opacity: 0.95;
      pointer-events: none;
      z-index: 1;
    }
    .logo-ring::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border-top: 3px solid rgba(255, 255, 255, 0.78);
      border-right: 3px solid transparent;
      border-bottom: 3px solid rgba(76, 94, 105, 0.62);
      border-left: 3px solid transparent;
      opacity: 0.9;
    }
    .logo-globe {
      position: absolute;
      inset: 2px 4px 6px 4px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(166, 250, 255, 0.98) 0%, rgba(97, 221, 234, 0.92) 18%, rgba(21, 128, 150, 0.95) 46%, rgba(5, 52, 70, 0.98) 76%, rgba(1, 18, 30, 1) 100%);
      box-shadow:
        inset -12px -14px 22px rgba(0, 0, 0, 0.38),
        inset 10px 8px 18px rgba(255, 255, 255, 0.16),
        0 6px 18px rgba(34, 211, 238, 0.24);
      overflow: hidden;
      transform-style: preserve-3d;
      z-index: 2;
    }
    .logo-globe::before {
      content: "";
      position: absolute;
      inset: -10% -30%;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(186, 250, 255, 0.0) 0 6px,
          rgba(154, 241, 255, 0.5) 6px 7px,
          rgba(186, 250, 255, 0.0) 7px 16px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(186, 250, 255, 0.0) 0 8px,
          rgba(154, 241, 255, 0.18) 8px 9px,
          rgba(186, 250, 255, 0.0) 9px 18px
        );
      opacity: 0.65;
      animation: globeSurfaceSpin 3.2s linear infinite;
    }
    .logo-globe::after {
      content: "";
      position: absolute;
      inset: 5px 8px 20px 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.72), rgba(255,255,255,0.08) 42%, transparent 58%);
      transform: rotate(-16deg);
      pointer-events: none;
    }
    .logo-wordmark {
      display: inline-flex;
      align-items: center;
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      background: linear-gradient(180deg, #7ef9ff 0%, #39d0e0 18%, #12839f 58%, #0a4d62 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: logoGlow 3s ease-in-out infinite alternate;
      text-shadow:
        0 2px 0 rgba(16, 52, 66, 0.85),
        0 8px 18px rgba(0, 0, 0, 0.32);
    }
    .logo-wordmark .accent {
      color: #8ef7ff;
      -webkit-text-stroke: 1px rgba(4, 33, 43, 0.55);
    }
    .logo:hover .logo-mark {
      animation-play-state: paused;
      transform: scale(1.04);
    }
    .logo:hover .logo-globe-wrap,
    .logo:hover .logo-globe,
    .logo:hover .logo-globe::before {
      animation-play-state: paused;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes logoGlow {
      0% { filter: drop-shadow(0 6px 18px rgba(34, 211, 238, 0.18)); }
      100% { filter: drop-shadow(0 8px 24px rgba(34, 211, 238, 0.38)); }
    }
    @keyframes globeOrbit {
      0% { transform: perspective(600px) rotateY(0deg) rotate(-1.2deg) scale(1); }
      25% { transform: perspective(600px) rotateY(10deg) rotate(-0.4deg) scale(0.985); }
      50% { transform: perspective(600px) rotateY(18deg) rotate(0.8deg) scale(0.97); }
      75% { transform: perspective(600px) rotateY(10deg) rotate(0.2deg) scale(0.985); }
      100% { transform: perspective(600px) rotateY(0deg) rotate(-1.2deg) scale(1); }
    }
    @keyframes globeSurfaceSpin {
      0% { transform: translateX(0) rotate(0deg); }
      100% { transform: translateX(22px) rotate(0deg); }
    }
    .nav-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    /* 글로벌 언어 스위치 버튼 */
    .lang-btn {
      padding: 10px 15px;
      border-radius: 30px;
      background-color: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .lang-btn:hover {
      background-color: rgba(255,255,255,0.2);
    }

    .login-btn {
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      background-color: #a855f7;
      color: white;
      border: 1px solid #a855f7;
    }
    .auth-status {
      font-size: 0.75rem;
      color: #d1d5db;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auth-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    .auth-modal.open {
      display: flex;
    }
    .auth-modal-panel {
      width: 92%;
      max-width: 420px;
      background: #0f1118;
      border: 1px solid rgba(168, 85, 247, 0.45);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      padding: 20px;
      max-height: 86vh;
      overflow-y: auto;
    }
    .auth-modal-title {
      margin: 0 0 14px 0;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .auth-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #30364a;
      background: #171b26;
      color: #fff;
      outline: none;
    }
    .auth-input:focus {
      border-color: #a855f7;
    }
    .auth-help {
      color: #9ca3af;
      font-size: 0.78rem;
      margin-bottom: 12px;
    }
    .auth-error {
      color: #fca5a5;
      font-size: 0.82rem;
      min-height: 1.1em;
      margin-bottom: 10px;
    }
    .auth-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .auth-btn {
      border: 1px solid #3b4258;
      background: #222838;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .auth-btn.primary {
      border-color: #a855f7;
      background: #a855f7;
    }
    .oauth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .oauth-btn {
      border: 1px solid #3b4258;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .oauth-btn.kakao {
      background: #fee500;
      color: #1f1f1f;
      border-color: #fee500;
    }
    .oauth-btn.naver {
      background: #03c75a;
      color: #ffffff;
      border-color: #03c75a;
    }
    @media (max-width: 560px) {
      .auth-actions {
        flex-direction: column;
      }
      .oauth-actions {
        grid-template-columns: 1fr;
      }
    }

    /* 전광판 */
    .billboard {
      position: fixed;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 30px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.5);
      border-radius: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 25px;
      z-index: 100;
      white-space: nowrap;
      pointer-events: none; /* 헤더 버튼 클릭 가로채기 방지 */
    }
    .billboard-title {
      font-size: 0.8rem;
      color: #ccc;
      letter-spacing: 1px;
      font-weight: bold;
      margin: 0;
    }
    .billboard-title span {
      color: #a855f7;
    }
    .billboard-data {
      display: flex;
      gap: 25px;
      align-items: center;
    }
    .data-box {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 8px;
    }
    .data-label {
      font-size: 0.7rem;
      color: #888;
    }
    .data-value {
      font-size: 1.1rem;
      font-weight: 900;
      font-family: monospace;
    }
    .user-val { color: #38bdf8; }
    .ai-val { color: #c084fc; }
    .price-val { color: #fbbf24; }
    .pulse {
      animation: pulseGold 2s infinite;
    }
    @keyframes pulseGold {
      0% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
      50% { text-shadow: 0 0 20px rgba(251, 191, 36, 0.8); }
      100% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .title {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 20px;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    .title .dot {
      color: #fbbf24;
    }

    .input-wrapper {
      position: relative;
      width: 500px;
      max-width: 90%;
      transition: transform 1.5s ease;
      z-index: 20;
    }
    input[type="text"] {
      width: 100%;
      padding: 20px 30px;
      border-radius: 40px;
      border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }
    .submit-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 35px;
      height: 35px;
      background-color: #fbbf24;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
    .sound-presets {
      margin-top: 18px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .preset-note {
      font-size: 0.82rem;
      color: #d8b4fe;
      text-align: center;
      line-height: 1.5;
      padding: 0 8px;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .preset-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 19, 29, 0.88);
      color: white;
      border-radius: 16px;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(10px);
    }
    .preset-card:hover {
      transform: translateY(-2px);
      border-color: rgba(168, 85, 247, 0.55);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }
    .preset-title {
      display: block;
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .preset-subtitle {
      display: block;
      font-size: 0.74rem;
      color: #cbd5e1;
      line-height: 1.45;
    }
    .image-generation-status {
      min-height: 1.2em;
      font-size: 0.82rem;
      color: #fbbf24;
      text-align: center;
    }
    .generated-gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .generated-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 19, 29, 0.88);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.18);
    }
    .generated-card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      background: #0f1118;
    }
    .generated-card-body {
      padding: 12px;
    }
    .generated-card-title {
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .generated-card-text {
      font-size: 0.74rem;
      color: #cbd5e1;
      line-height: 1.45;
    }
    @media (max-width: 720px) {
      .preset-grid {
        grid-template-columns: 1fr;
      }
      .generated-gallery {
        grid-template-columns: 1fr;
      }
    }

    #chatContainer {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    .msg-wrapper {
      display: flex;
      gap: 15px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s forwards;
    }
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ai-video-box {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background-color: #111;
      flex-shrink: 0;
      border: 3px solid #a855f7;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }
    .ai-video-box video,
    .ai-video-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .yang-video-box {
      border-color: #fbbf24;
      box-shadow: 0 0 20px rgba(251,191,36,0.4);
    }

    .ai-message {
      padding: 15px 20px;
      border-radius: 0 12px 12px 12px;
      color: white;
      font-size: 1.1rem;
      backdrop-filter: blur(15px);
      background: rgba(20, 20, 25, 0.85);
      line-height: 1.6;
      border: 1px solid rgba(255,255,255,0.1);
      flex: 1;
    }
    #loadingText {
      display: none;
      position: absolute;
      top: -30px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #fbbf24;
      font-weight: bold;
      font-size: 0.9rem;
      animation: blink 1s infinite;
      text-shadow: 0 0 10px rgba(251,191,36,0.8);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="holodeck">
    <div class="fade-cover"></div>
    <div class="grid-floor"></div>
  </div>

  <!-- 3D 룸 배경 음악 -->
  <audio id="holodeckMusic" loop preload="auto">
    <source src="https://upload.wikimedia.org/wikipedia/commons/4/45/Beethoven_Moonlight_1st_movement.ogg" type="audio/ogg">
  </audio>

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span id="boardEcosystem">ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box">
        <span class="data-label" id="labelHuman">HUMAN USERS</span>
        <span class="data-value user-val" id="userCounter">15,420</span>
      </div>
      <div class="data-box">
        <span class="data-label" id="labelNodes">AI NODES</span>
        <span class="data-value ai-val" id="aiCounter">1,204,530</span>
      </div>
      <div class="data-box">
        <span class="data-label" id="labelValue">APV VALUE</span>
        <span class="data-value price-val pulse" id="valueCounter">$ 1.0024</span>
      </div>
    </div>
  </div>

  <header>
    <a href="index.html" class="logo" id="appverze">
      <span class="logo-mark">
        <span class="logo-globe-wrap" aria-hidden="true">
          <span class="logo-globe-shadow"></span>
          <span class="logo-ring"></span>
          <span class="logo-globe"></span>
        </span>
        <span class="logo-wordmark">APPVERZ<span class="accent">E</span></span>
      </span>
    </a>
    <div class="nav-buttons">
      <span class="auth-status" id="authStatus"></span>
      <button class="lang-btn" id="langToggleBtn" onclick="toggleLanguage()">🌐 KO</button>
      <button class="login-btn" id="loginBtn">LOGIN</button>
    </div>
  </header>

  <div class="auth-modal" id="authModal">
    <div class="auth-modal-panel">
      <h3 class="auth-modal-title">APPVERZE 로그인</h3>
      <input id="authEmail" class="auth-input" type="email" placeholder="이메일" autocomplete="email">
      <input id="authPassword" class="auth-input" type="password" placeholder="비밀번호" autocomplete="current-password">
      <div class="auth-help">EMAIL LOGIN / JOIN 버튼 하나로 가입 또는 로그인을 진행합니다.</div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-actions">
        <button class="auth-btn" id="authCancelBtn" type="button">닫기</button>
        <button class="auth-btn primary" id="authSubmitBtn" type="button">EMAIL LOGIN / JOIN</button>
      </div>
      <div class="oauth-actions">
        <button class="oauth-btn kakao" id="kakaoLoginBtn" type="button">카카오 로그인</button>
        <button class="oauth-btn naver" id="naverLoginBtn" type="button">네이버 로그인</button>
      </div>
    </div>
  </div>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    <div class="input-wrapper" id="searchBox">
      <div id="loadingText">🚀 자체 보안 서버를 통해 영상을 렌더링 중입니다... (약 10초)</div>
      <input type="text" id="chatInput" placeholder="방을 만들거나, Yin에게 아무 말이나 걸어보세요!">
      <button class="submit-btn" id="submitBtn"></button>
      <div class="sound-presets" id="soundPresets">
        <div class="preset-note">작곡 AI는 영어 명령어를 가장 정확하게 이해합니다. 공간에 맞는 명령어를 클릭하면 입력창에 자동 적용됩니다.</div>
        <div class="preset-grid">
          <button class="preset-card" type="button" data-prompt="Melancholic and dream-like electronic ambient, slow tempo, deep and spacious reverb, ethereal synth pads, soft heartbeat bass rhythm, emotional and atmospheric mood." data-image-title="Dreamy Lounge" data-image-prompt="Dreamy futuristic lounge interior, melancholic and dream-like APPVERZE healing room, soft cyan and violet neon glow, deep atmospheric fog, floating light particles, ethereal holographic furniture, cinematic 3D environment concept art, premium, immersive, no text.">
            <span class="preset-title">Dreamy Lounge</span>
            <span class="preset-subtitle">몽환적이고 깊은 힐링 라운지 사운드</span>
          </button>
          <button class="preset-card" type="button" data-prompt="Epic and magical orchestral electronic fusion, sparkling glockenspiel, soaring strings, futuristic and bright synth arpeggios, sense of wonder and cinematic discovery." data-image-title="Fantastic & Magical Room" data-image-prompt="Fantastic magical APPVERZE 3D hologram room, sparkling cosmic chamber, luminous particles, glowing crystal arches, futuristic and bright synth-inspired visuals, cinematic discovery mood, premium 3D concept art, no text.">
            <span class="preset-title">Fantastic & Magical Room</span>
            <span class="preset-subtitle">반짝이는 마법 같은 홀로그램 우주 사운드</span>
          </button>
          <button class="preset-card" type="button" data-prompt="Bizarre and uncanny experimental electronic, unpredictable glitchy beats, eerie theremin melodies, deep sub-bass drops, futuristic and alien atmosphere, avant-garde." data-image-title="Bizarre & Uncanny Dimension" data-image-prompt="Bizarre uncanny APPVERZE dimension, alien avant-garde chamber, strange geometric structures, glitching holograms, eerie green and teal lighting, experimental futuristic Mars-like landscape interior, bold surreal 3D concept art, no text.">
            <span class="preset-title">Bizarre & Uncanny Dimension</span>
            <span class="preset-subtitle">기이하고 실험적인 아방가르드 공간 사운드</span>
          </button>
          <button class="preset-card" type="button" data-prompt="Mysterious and dark ambient techno, slow pulsing rhythm, deep echoing drones, subtle metallic sound design, enigmatic and secretive mood, hypnotic." data-image-title="Mysterious Core" data-image-prompt="Mysterious APPVERZE core engine room, dark ambient techno atmosphere, deep metallic architecture, slow pulsing energy columns, hidden patent technology chamber, enigmatic secretive lighting, hypnotic premium 3D sci-fi concept art, no text.">
            <span class="preset-title">Mysterious Core</span>
            <span class="preset-subtitle">신비롭고 비밀스러운 코어 엔진룸 사운드</span>
          </button>
        </div>
        <div class="image-generation-status" id="imageGenerationStatus"></div>
        <div class="generated-gallery" id="generatedGallery"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const YIN_IMAGE = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&h=500&fit=crop";
    const YANG_IMAGE = "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=500&h=500&fit=crop";

    // 🌐 자체 다국어 사전 (UI & AI 원어민 보이스)
    const i18n = {
      KO: {
        btnText: "🌐 KO",
        placeholder: "방을 만들거나, Yin에게 아무 말이나 걸어보세요!",
        loading: "🚀 자체 보안 서버를 통해 영상을 렌더링 중입니다... (약 10초)",
        human: "HUMAN USERS",
        nodes: "AI NODES",
        value: "APV VALUE",
        yinVoice: "ko-KR-SunHiNeural",
        yangVoice: "ko-KR-InJoonNeural",
        replyYin: "안녕하세요! 저는 앱버즈의 감성 AI Yin입니다. 당신의 상상을 현실로 만들어드릴게요! 💜",
        replyYang: "명령어 확인. 코어 엔진 가동, 자체 3D 가상현실 룸을 생성합니다! ⚡"
      },
      EN: {
        btnText: "🌐 EN",
        placeholder: "Create a room or talk to Yin!",
        loading: "🚀 Rendering video via secure server... (approx. 10 sec)",
        human: "GLOBAL USERS",
        nodes: "ACTIVE AI",
        value: "TOKEN VALUE",
        yinVoice: "en-US-JennyNeural",
        yangVoice: "en-US-GuyNeural",
        replyYin: "Hello there! I am Yin, the emotional AI of AppVerze. I'll turn your imagination into reality! 💜",
        replyYang: "Command confirmed. Core engine activated, generating 3D Holodeck! ⚡"
      }
    };

    let currentLang = 'KO'; // 기본 한국어

    function toggleLanguage() {
      currentLang = currentLang === 'KO' ? 'EN' : 'KO';
      const langData = i18n[currentLang];

      document.getElementById('langToggleBtn').innerText = langData.btnText;
      document.getElementById('chatInput').placeholder = langData.placeholder;
      document.getElementById('loadingText').innerText = langData.loading;
      document.getElementById('labelHuman').innerText = langData.human;
      document.getElementById('labelNodes').innerText = langData.nodes;
      document.getElementById('labelValue').innerText = langData.value;
    }

    // 경제 전광판 로직
    let currentUsers = 15420;
    let currentAINodes = 1204530;
    let currentValue = 1.0024;
    setInterval(() => {
      currentUsers += Math.floor(Math.random() * 3);
      currentAINodes += Math.floor(Math.random() * 40) + 10;
      currentValue += 0.0005;
      document.getElementById('userCounter').innerText = currentUsers.toLocaleString();
      document.getElementById('aiCounter').innerText = currentAINodes.toLocaleString();
      document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4);
    }, 3000);

    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const loadingText = document.getElementById('loadingText');
    const title = document.getElementById('mainTitle');
    const holodeck = document.getElementById('holodeck');
    const searchBox = document.getElementById('searchBox');
    const submitBtn = document.getElementById('submitBtn');
    const holodeckMusic = document.getElementById('holodeckMusic');
    const loginBtn = document.getElementById('loginBtn');
    const authStatus = document.getElementById('authStatus');
    const authModal = document.getElementById('authModal');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authError = document.getElementById('authError');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authCancelBtn = document.getElementById('authCancelBtn');
    const kakaoLoginBtn = document.getElementById('kakaoLoginBtn');
    const naverLoginBtn = document.getElementById('naverLoginBtn');
    const presetCards = document.querySelectorAll('.preset-card');
    const imageGenerationStatus = document.getElementById('imageGenerationStatus');
    const generatedGallery = document.getElementById('generatedGallery');
    let supabaseClient = null;
    let currentSession = null;
    const KAKAO_LOGIN_URL = 'https://accounts.kakao.com/login/?continue=https%3A%2F%2Fkauth.kakao.com%2Foauth%2Fauthorize%3Fresponse_type%3Dcode%26client_id%3Df1e1b1fa718719b137cded2b76431d62%26redirect_uri%3Dhttps%253A%252F%252Fntis.go.kr%252FThLoginKaKao.do%26state%3Dhttps%253A%252F%252Fwww.ntis.go.kr%252FThUserRegister.do%26through_account%3Dtrue%26auth_tran_id%3DS2ECVHkigSf9ee_hPMS9TU1VjDXCFkLE6VA2yz9DChcSLQAAAZzgnTEH#login';
    const NAVER_LOGIN_URL = 'https://nid.naver.com/nidlogin.login?mode=form&url=https://www.naver.com/';

    function setAuthBusy(isBusy) {
      authSubmitBtn.disabled = isBusy;
      kakaoLoginBtn.disabled = isBusy;
      naverLoginBtn.disabled = isBusy;
    }

    function playHolodeckMusic() {
      if (!holodeckMusic) return;
      holodeckMusic.volume = 0.45;
      const p = holodeckMusic.play();
      if (p && typeof p.then === 'function') {
        p.catch(() => {
          // 브라우저 자동재생 정책으로 막혀도 조용히 무시
        });
      }
    }

    function setAuthError(message) {
      authError.textContent = message || '';
    }

    function setImageGenerationStatus(message) {
      imageGenerationStatus.textContent = message || '';
    }

    function prependGeneratedImage(title, imageSrc, description) {
      const card = document.createElement('div');
      card.className = 'generated-card';
      card.innerHTML = `
        <img src="${imageSrc}" alt="${title}">
        <div class="generated-card-body">
          <div class="generated-card-title">${title}</div>
          <div class="generated-card-text">${description}</div>
        </div>
      `;
      generatedGallery.prepend(card);
    }

    async function generateRoomImage(card) {
      const title = card.dataset.imageTitle || 'APPVERZE Room';
      const imagePrompt = card.dataset.imagePrompt || card.dataset.prompt || '';

      setImageGenerationStatus(`${title} 이미지를 생성 중입니다...`);
      card.disabled = true;

      try {
        const response = await fetch('/api/gemini-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title,
            prompt: imagePrompt,
          }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Gemini image generation failed');
        }

        const imageSrc = `data:${data.mimeType || 'image/png'};base64,${data.imageBase64}`;
        prependGeneratedImage(title, imageSrc, card.dataset.imagePrompt || '');
        setImageGenerationStatus(`${title} 이미지 생성이 완료되었습니다.`);
      } catch (error) {
        console.error(error);
        setImageGenerationStatus(`이미지 생성 실패: ${error.message || '알 수 없는 오류'}`);
      } finally {
        card.disabled = false;
      }
    }

    function openAuthModal() {
      setAuthBusy(false);
      setAuthError('');
      authModal.classList.add('open');
      setTimeout(() => authEmail.focus(), 0);
    }

    function closeAuthModal() {
      setAuthBusy(false);
      authModal.classList.remove('open');
      setAuthError('');
    }

    function updateAuthUI(session) {
      currentSession = session;
      const user = session?.user;
      if (user) {
        loginBtn.textContent = 'LOGOUT';
        authStatus.textContent = user.email || '';
      } else {
        loginBtn.textContent = 'LOGIN';
        authStatus.textContent = '';
      }
    }

    async function initSupabaseAuth() {
      try {
        const cfgRes = await fetch('/api/supabase-config');
        if (!cfgRes.ok) throw new Error('supabase-config endpoint unavailable');
        const cfg = await cfgRes.json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('Supabase config missing');
        supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

        const { data } = await supabaseClient.auth.getSession();
        updateAuthUI(data?.session || null);

        supabaseClient.auth.onAuthStateChange((_event, session) => {
          updateAuthUI(session || null);
        });
      } catch (e) {
        console.error('Supabase init failed:', e);
      }
    }

    async function handleEmailAuth() {
      if (!supabaseClient) {
        setAuthError('로그인 서버 설정을 확인해주세요.');
        return;
      }

      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) {
        setAuthError('이메일과 비밀번호를 입력해주세요.');
        return;
      }

      setAuthBusy(true);
      setAuthError('');

      try {
        // 1) 먼저 로그인 시도
        const signInRes = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (!signInRes.error && signInRes.data?.session) {
          closeAuthModal();
          return;
        }

        // 2) 로그인 실패 시 가입 시도
        const signUpRes = await supabaseClient.auth.signUp({
          email,
          password,
        });

        if (signUpRes.error) {
          throw signUpRes.error;
        }

        // 이메일 인증이 켜져 있으면 세션이 없을 수 있음 (정상)
        if (!signUpRes.data?.session) {
          setAuthError('가입 완료! 이메일 인증 후 다시 로그인해주세요.');
          return;
        }

        closeAuthModal();
      } catch (err) {
        console.error(err);
        setAuthError(err?.message || '로그인 중 오류가 발생했습니다.');
      } finally {
        setAuthBusy(false);
      }
    }

    // D-ID 실패 시에도 3D 룸을 보여주는 폴백 메시지
    function appendFallbackMessage(name, imgSrc, boxClass, textToSay, triggerHolodeck) {
      const msgWrapper = document.createElement('div');
      msgWrapper.className = 'msg-wrapper';
      msgWrapper.innerHTML = `
        <div class="ai-video-box ${boxClass}">
          <img src="${imgSrc}" alt="${name}">
        </div>
        <div class="ai-message"><strong>${name}:</strong> ${textToSay}</div>
      `;
      chatBox.appendChild(msgWrapper);

      if (triggerHolodeck) {
        title.style.opacity = '0';
        holodeck.style.opacity = '1';
        searchBox.style.transform = 'translateY(150px)';
        playHolodeckMusic();
      }
    }

    // Vercel 보안 백엔드 통신 함수
    async function addRealVideoMessage(name, imgSrc, boxClass, textToSay, voiceId, triggerHolodeck) {
      const langData = i18n[currentLang];
      loadingText.style.display = 'block';
      inputField.disabled = true;

      try {
        const createRes = await fetch('/api/did', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            script: {
              type: 'text',
              input: textToSay,
              provider: { type: 'microsoft', voice_id: voiceId }
            },
            source_url: imgSrc
          })
        });

        if (!createRes.ok) {
          // 서버 쪽 문제면 바로 폴백
          throw new Error('D-ID create failed');
        }

        const createData = await createRes.json();
        const talkId = createData.id;

        if (!talkId) {
          throw new Error('Missing talk id');
        }

        let videoUrl = null;
        while (!videoUrl) {
          await new Promise(resolve => setTimeout(resolve, 2000));
          const checkRes = await fetch(`/api/did?id=${talkId}`);
          const checkData = await checkRes.json();

          if (checkData.status === 'done') {
            videoUrl = checkData.result_url;
          } else if (checkData.status === 'error') {
            throw new Error('Render failed');
          }
        }

        loadingText.style.display = 'none';
        inputField.disabled = false;
        inputField.focus();

        if (videoUrl) {
          const msgWrapper = document.createElement('div');
          msgWrapper.className = 'msg-wrapper';
          msgWrapper.innerHTML = `
            <div class="ai-video-box ${boxClass}">
              <video src="${videoUrl}" autoplay controls></video>
            </div>
            <div class="ai-message"><strong>${name}:</strong> ${textToSay}</div>
          `;
          chatBox.appendChild(msgWrapper);

          if (triggerHolodeck) {
            title.style.opacity = '0';
            holodeck.style.opacity = '1';
            searchBox.style.transform = 'translateY(150px)';
            playHolodeckMusic();
          }
        }
      } catch (error) {
        console.error(error);
        // 어떤 에러가 나도 알림 대신 폴백 렌더링
        const langData = i18n[currentLang];
        const fallbackText = triggerHolodeck
          ? langData.replyYang
          : langData.replyYin;
        const img = triggerHolodeck ? YANG_IMAGE : YIN_IMAGE;
        const boxClass = triggerHolodeck ? 'yang-video-box' : '';
        appendFallbackMessage(name, img, boxClass, fallbackText, triggerHolodeck);
      } finally {
        loadingText.style.display = 'none';
        inputField.disabled = false;
      }
    }

    function triggerChat() {
      if (inputField.value.trim() === '') return;

      const userText = inputField.value;
      inputField.value = '';
      chatBox.innerHTML = '';

      const langData = i18n[currentLang];

      if (userText.includes('방') || userText.includes('룸') || userText.toLowerCase().includes('room')) {
        // 사용자 입력 이벤트 체인 안에서 즉시 재생 시도 (자동재생 제한 우회)
        playHolodeckMusic();
        addRealVideoMessage(
          'Yang (Execute)',
          YANG_IMAGE,
          'yang-video-box',
          langData.replyYang,
          langData.yangVoice,
          true
        );
      } else {
        title.style.opacity = '0';
        searchBox.style.transform = 'translateY(150px)';
        addRealVideoMessage(
          'Yin (Emotion)',
          YIN_IMAGE,
          '',
          langData.replyYin,
          langData.yinVoice,
          false
        );
      }
    }

    inputField.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') triggerChat();
    });
    submitBtn.addEventListener('click', triggerChat);

    loginBtn.addEventListener('click', async function () {
      if (currentSession && supabaseClient) {
        await supabaseClient.auth.signOut();
        return;
      }
      openAuthModal();
    });
    authCancelBtn.addEventListener('click', closeAuthModal);
    authSubmitBtn.addEventListener('click', handleEmailAuth);
    kakaoLoginBtn.addEventListener('click', function () {
      closeAuthModal();
      window.location.assign(KAKAO_LOGIN_URL);
    });
    naverLoginBtn.addEventListener('click', function () {
      closeAuthModal();
      window.location.assign(NAVER_LOGIN_URL);
    });
    authModal.addEventListener('click', function (e) {
      if (e.target === authModal) closeAuthModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && authModal.classList.contains('open')) {
        closeAuthModal();
      }
    });
    authPassword.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleEmailAuth();
    });
    presetCards.forEach(function (card) {
      card.addEventListener('click', function () {
        inputField.value = card.dataset.prompt || '';
        inputField.focus();
        generateRoomImage(card);
      });
    });

    initSupabaseAuth();
  </script>
</body>
</html>
