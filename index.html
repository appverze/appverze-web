<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - REAL D-ID</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0; padding: 0; background-color: #0b0b0f; color: white;
      font-family: 'Pretendard', sans-serif; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* 🚀 무적의 자체 3D 홀로그램 엔진 (Holodeck) */
    #holodeck {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #050508; perspective: 1000px;
      opacity: 0; z-index: 1; transition: opacity 1.5s ease-in-out; pointer-events: none; overflow: hidden;
    }
    .grid-floor {
      position: absolute; bottom: -80%; left: -50%; width: 200%; height: 200%;
      background-image: linear-gradient(rgba(168, 85, 247, 0.7) 2px, transparent 2px), linear-gradient(90deg, rgba(168, 85, 247, 0.7) 2px, transparent 2px);
      background-size: 80px 80px; transform: rotateX(80deg); animation: gridMove 2s linear infinite;
    }
    .fade-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #050508 30%, transparent 100%); z-index: 2; }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

    header, main { position: relative; z-index: 10; pointer-events: auto; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; } .logo span { color: #fbbf24; }
    .nav-buttons { display: flex; gap: 15px; align-items: center; }
    .lounge-btn, .login-btn { padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
    .lounge-btn { background-color: white; color: black; text-decoration: none; }
    .login-btn { background-color: #a855f7; color: white; border: 1px solid #a855f7; }

    /* 전광판 */
    .billboard {
      position: fixed; top: 25px; left: 50%; transform: translateX(-50%); padding: 10px 30px; background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 40px; backdrop-filter: blur(15px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 25px; z-index: 100; white-space: nowrap;
    }
    .billboard-title { font-size: 0.8rem; color: #ccc; letter-spacing: 1px; font-weight: bold; margin: 0; } .billboard-title span { color: #a855f7; }
    .billboard-data { display: flex; gap: 25px; align-items: center; }
    .data-box { display: flex; flex-direction: row; align-items: baseline; gap: 8px; }
    .data-label { font-size: 0.7rem; color: #888; } .data-value { font-size: 1.1rem; font-weight: 900; font-family: monospace; }
    .user-val { color: #38bdf8; } .ai-val { color: #c084fc; } .price-val { color: #fbbf24; }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .title { font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; transition: opacity 1.5s ease; pointer-events: none; }
    .title .dot { color: #fbbf24; }

    .input-wrapper { position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; z-index: 20; }
    input[type="text"] { width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333; background-color: rgba(255, 255, 255, 0.05); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; backdrop-filter: blur(10px); }
    .submit-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer; }

    /* 채팅 및 리얼 비디오 영역 */
    #chatContainer { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
    
    .msg-wrapper { display: flex; gap: 15px; align-items: flex-start; opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* D-ID 비디오 액자 */
    .ai-video-box {
      width: 120px; height: 120px; border-radius: 50%; background-color: #111; flex-shrink: 0;
      border: 3px solid #a855f7; overflow: hidden; position: relative;
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }
    .ai-video-box img, .ai-video-box video { width: 100%; height: 100%; object-fit: cover; }
    .yang-video-box { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.4); }

    .ai-message {
      padding: 15px 20px; border-radius: 0 12px 12px 12px; color: white; font-size: 1.1rem;
      backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85); line-height: 1.6; border: 1px solid rgba(255,255,255,0.1); flex: 1;
    }

    #loadingText { display: none; position: absolute; top: -30px; left: 0; width: 100%; text-align: center; color: #a855f7; font-weight: bold; font-size: 0.9rem; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  </style>
</head>
<body>

  <div id="holodeck"><div class="fade-cover"></div><div class="grid-floor"></div></div>

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span>ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box"><span class="data-label">HUMAN</span><span class="data-value user-val" id="userCounter">15,420</span></div>
      <div class="data-box"><span class="data-label">AI NODES</span><span class="data-value ai-val" id="aiCounter">1,204,530</span></div>
      <div class="data-box"><span class="data-label">APV VALUE</span><span class="data-value price-val pulse" id="valueCounter">$ 1.0024</span></div>
    </div>
  </div>

  <header>
    <div class="logo">APPVERZE<span>.</span></div>
    <div class="nav-buttons"><button class="login-btn">LOGIN</button></div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <div id="loadingText">🚀 진짜 서버에서 영상을 렌더링 중입니다... (약 10초)</div>
      <input type="text" id="chatInput" placeholder="방을 만들거나, Yin에게 아무 말이나 걸어보세요!">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>

  <script>
    // 🚨 친구가 가져온 진짜 D-ID API KEY (Base64 암호화 처리 완비!)
    const RAW_API_KEY = "Y2hvaWtpY2thbkBnbWFpbC5jb20:cU9Y9QncMKjzGnNNNsjOa";
    const AUTH_TOKEN = "Basic " + btoa(RAW_API_KEY); 
    
    // Yin의 얼굴로 쓸 기본 사진 (인터넷 주소)
    const YIN_IMAGE = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&h=500&fit=crop";
    const YANG_IMAGE = "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=500&h=500&fit=crop";

    /* 경제 시스템 전광판 로직 */
    let currentUsers = 15420; let currentAINodes = 1204530; let currentValue = 1.0024;
    setInterval(() => {
      currentUsers += Math.floor(Math.random() * 3); currentAINodes += Math.floor(Math.random() * 40) + 10; currentValue += 0.0005;
      document.getElementById('userCounter').innerText = currentUsers.toLocaleString();
      document.getElementById('aiCounter').innerText = currentAINodes.toLocaleString();
      document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4);
    }, 3000);

    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const loadingText = document.getElementById('loadingText');
    const title = document.getElementById('mainTitle');
    const holodeck = document.getElementById('holodeck');
    const searchBox = document.getElementById('searchBox');

    // 채팅창에 정적인 이미지 메시지 띄우는 함수 (Yang 전용)
    function addStaticMessage(name, imgSrc, boxClass, text) {
      const msgWrapper = document.createElement('div');
      msgWrapper.className = 'msg-wrapper';
      msgWrapper.innerHTML = `
        <div class="ai-video-box ${boxClass}"><img src="${imgSrc}"></div>
        <div class="ai-message"><strong>${name} (실행):</strong> ${text}</div>
      `;
      chatBox.appendChild(msgWrapper);
    }

    // 🚀 [핵심] D-ID 서버 통신해서 진짜 비디오 띄우는 함수 (Yin 전용)
    async function addRealVideoMessage(name, textToSay) {
      loadingText.style.display = 'block';
      inputField.disabled = true;

      try {
        // 1단계: D-ID 서버에 영상 제작 요청 (POST)
        const createRes = await fetch('https://api.d-id.com/talks', {
          method: 'POST',
          headers: { 'Authorization': AUTH_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            script: { type: 'text', input: textToSay, provider: { type: 'microsoft', voice_id: 'ko-KR-SunHiNeural' } },
            source_url: YIN_IMAGE
          })
        });

        const createData = await createRes.json();
        const talkId = createData.id;

        if(!talkId) {
          alert("API 연동 오류! 키가 만료되었거나 무료 크레딧을 다 썼을 수 있어.");
          loadingText.style.display = 'none'; inputField.disabled = false; return;
        }

        // 2단계: 영상 완성될 때까지 2초마다 확인 (Polling)
        let videoUrl = null;
        while (!videoUrl) {
          await new Promise(resolve => setTimeout(resolve, 2000)); 
          const checkRes = await fetch(`https://api.d-id.com/talks/${talkId}`, {
            method: 'GET', headers: { 'Authorization': AUTH_TOKEN }
          });
          const checkData = await checkRes.json();

          if (checkData.status === 'done') {
            videoUrl = checkData.result_url; 
          } else if (checkData.status === 'error') {
            alert("영상 렌더링 에러!"); break;
          }
        }

        loadingText.style.display = 'none';
        inputField.disabled = false;
        inputField.focus();

        // 3단계: 화면에 진짜 비디오 띄우기!
        if (videoUrl) {
          const msgWrapper = document.createElement('div');
          msgWrapper.className = 'msg-wrapper';
          msgWrapper.innerHTML = `
            <div class="ai-video-box">
              <video src="${videoUrl}" autoplay controls style="width:100%; height:100%; object-fit:cover;"></video>
            </div>
            <div class="ai-message"><strong>${name} (감성):</strong> ${textToSay}</div>
          `;
          chatBox.appendChild(msgWrapper);
        }

      } catch (error) {
        console.error(error);
        alert("인터넷이 끊겼거나 D-ID 서버가 응답하지 않아!");
        loadingText.style.display = 'none'; inputField.disabled = false;
      }
    }

    // 엔터키 입력 시 작동 로직
    inputField.addEventListener('keypress', function (e) {
      if (e.key === 'Enter' && inputField.value.trim() !== '') {
        const userText = inputField.value;
        inputField.value = '';
        chatBox.innerHTML = ''; // 화면 리셋

        if(userText.includes('방') || userText.includes('룸') || userText.includes('방송국')) {
          // '방' 관련 명령어면 Yang이 3D 홀로그램을 켬
          addStaticMessage('Yang', YANG_IMAGE, 'yang-video-box', `명령어 확인. 코어 엔진 가동, 자체 3D 가상현실 룸(Holodeck)을 생성합니다! ⚡`);
          setTimeout(() => {
            title.style.opacity = '0'; holodeck.style.opacity = '1'; searchBox.style.transform = 'translateY(150px)';
          }, 1000);
        } else {
          // 일상 대화면 D-ID 서버 연동해서 Yin이 진짜로 대답함!
          title.style.opacity = '0'; searchBox.style.transform = 'translateY(150px)';
          addRealVideoMessage('Yin', `안녕하세요! "${userText}" 라고 말씀하셨군요. 저는 앱버즈의 감성 AI Yin입니다. 제 입모양이 움직이는 게 보이시나요? 💜`);
        }
      }
    });
  </script>
</body>
</html>
