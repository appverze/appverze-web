<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0f;
      color: white;
      font-family: 'Pretendard', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =========================================
       수정됨: 스튜디오 배경이 까만 벽 '앞으로' 나오게 설정!
       ========================================= */
    #studioBackground {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      /* 멋진 무대/조명 스튜디오 사진 */
      background: url('https://images.unsplash.com/photo-1470229722913-7c092bce8566?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover;
      opacity: 0; 
      z-index: 1; /* 까만 배경보다 앞으로 나오게 숫자 1로 변경! */
      transition: opacity 2s ease-in-out; 
    }

    /* 안의 내용물들은 배경보다 더 앞에 있어야 하므로 숫자를 높여줍니다. */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      position: relative;
      z-index: 10; 
    }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
    .logo span { color: #fbbf24; }
    
    .lounge-btn {
      padding: 10px 20px;
      border-radius: 30px;
      background-color: white;
      color: black;
      font-weight: bold;
      text-decoration: none;
      font-size: 0.9rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .title {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 40px;
      transition: opacity 1.5s ease; 
    }
    .title .dot { color: #fbbf24; }

    .input-wrapper {
      position: relative;
      width: 500px;
      max-width: 90%;
      transition: transform 1.5s ease; 
    }
    
    input {
      width: 100%;
      padding: 20px 30px;
      border-radius: 40px;
      border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    input:focus { border-color: #555; background-color: rgba(255, 255, 255, 0.1); }
    input::placeholder { color: #777; text-align: center; }
    
    .submit-btn {
      position: absolute;
      right: 15px; top: 50%; transform: translateY(-50%);
      width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer;
    }

    #chatContainer {
      position: absolute;
      top: 15%; 
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 100;
      pointer-events: none;
    }

    .ai-message {
      padding: 20px;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      backdrop-filter: blur(15px);
      background: rgba(20, 20, 25, 0.85);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s forwards;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      line-height: 1.6;
    }

    .yin-msg { border-left: 5px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.3); }
    .yang-msg { border-left: 5px solid #fbbf24; box-shadow: 0 0 25px rgba(251, 191, 36, 0.3); }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="studioBackground"></div>

  <header>
    <div class="logo">APPVERZE<span>.</span></div>
    <a href="#" class="lounge-btn">LOUNGE HUB</a>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="친구야 안녕? 이라고 말을 걸어보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>

  <script>
    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const submitBtn = document.getElementById('submitBtn');
    const background = document.getElementById('studioBackground');
    const title = document.getElementById('mainTitle');
    const searchBox = document.getElementById('searchBox');

    function triggerAI() {
      if (inputField.value.trim() !== '') {
        const userText = inputField.value;
        inputField.value = '';
        chatBox.innerHTML = ''; 

        if(userText.includes('방송국')) {
          
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = `<strong>Yin (감성):</strong> 와! 대형 유튜브 방송국이라니 너무 기대돼요! 멋진 무대와 조명을 세팅해 드릴게요. 💜`;
            chatBox.appendChild(yinMessage);
          }, 500);

          setTimeout(() => {
            const yangMessage = document.createElement('div');
            yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = `<strong>Yang (실행):</strong> 메인 무대, 관객석, 진행 테이블 구조 분석 완료. 3D 스튜디오 룸 데이터를 로드합니다. 이동합니다! ⚡`;
            chatBox.appendChild(yangMessage);

            // 화면 전환 애니메이션 (이제 사진이 제대로 보입니다!)
            setTimeout(() => {
              title.style.opacity = '0'; 
              background.style.opacity = '1'; 
              searchBox.style.transform = 'translateY(150px)'; 
            }, 1000);

          }, 2500);

        } else {
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = `<strong>Yin (감성):</strong> 네, 안녕하세요! 어떤 공간(Room)을 상상하고 계신가요? 💜`;
            chatBox.appendChild(yinMessage);
          }, 500);

          setTimeout(() => {
            const yangMessage = document.createElement('div');
            yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = `<strong>Yang (실행):</strong> 환영합니다. "${userText}" 라고 하셨군요. '방송국 만들어줘' 라고 명령하시면 즉시 공간을 생성해 드립니다. ⚡`;
            chatBox.appendChild(yangMessage);
          }, 2000);
        }
      }
    }

    inputField.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') triggerAI();
    });

    submitBtn.addEventListener('click', triggerAI);
  </script>
</body>
</html>
