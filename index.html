<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0; padding: 0; background-color: #0b0b0f; color: white;
      font-family: 'Pretendard', sans-serif; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    #studioImage {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0; z-index: 1; transition: opacity 1.5s ease-in-out;
    }

    header, main { position: relative; z-index: 10; }
    
    header {
      display: flex; justify-content: space-between; align-items: center; padding: 30px 50px;
    }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
    .logo span { color: #fbbf24; }
    
    .nav-buttons { display: flex; gap: 15px; align-items: center; }
    .lounge-btn {
      padding: 10px 20px; border-radius: 30px; background-color: white; color: black;
      font-weight: bold; text-decoration: none; font-size: 0.9rem;
    }
    
    .login-btn {
      padding: 10px 20px; border-radius: 30px; background-color: #a855f7; color: white;
      font-weight: bold; text-decoration: none; font-size: 0.9rem;
      transition: all 0.3s ease; border: 1px solid #a855f7; cursor: pointer;
    }
    .login-btn:hover { box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }

    /* =========================================
       새로 추가된 '디지털 지갑(Wallet)' 스타일
       ========================================= */
    .wallet-display {
      display: none; /* 처음엔 숨겨둠 (가입하면 나타남) */
      align-items: center; gap: 8px; padding: 8px 20px;
      border-radius: 30px; background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.5);
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .coin-icon { font-size: 1.2rem; }
    .coin-amount { font-weight: bold; color: #fbbf24; font-size: 1rem; letter-spacing: 1px; }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    main {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    .title {
      font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 40px; transition: opacity 1.5s ease; 
    }
    .title .dot { color: #fbbf24; }

    .input-wrapper {
      position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; 
    }
    
    input[type="text"] {
      width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05); color: white; font-size: 1.1rem;
      outline: none; box-sizing: border-box; backdrop-filter: blur(10px); transition: all 0.3s ease;
    }
    input[type="text"]:focus { border-color: #555; background-color: rgba(255, 255, 255, 0.1); }
    
    .submit-btn {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer;
    }

    #chatContainer {
      position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
      width: 80%; max-width: 600px; display: flex; flex-direction: column; gap: 15px;
      z-index: 100; pointer-events: none;
    }
    .ai-message {
      padding: 20px; border-radius: 12px; color: white; font-size: 1.1rem;
      backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85);
      opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s forwards; line-height: 1.6;
    }
    .yin-msg { border-left: 5px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.3); }
    .yang-msg { border-left: 5px solid #fbbf24; box-shadow: 0 0 25px rgba(251, 191, 36, 0.3); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* 모달창 스타일 */
    #modalOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 999;
    }
    #loginModal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 400px; padding: 40px; border-radius: 20px;
      background: rgba(15, 15, 20, 0.9); border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.2), 0 0 40px rgba(251, 191, 36, 0.2); 
      z-index: 1000; text-align: center;
    }
    #loginModal h2 { margin: 0 0 10px 0; font-weight: 900; letter-spacing: 1px; }
    #loginModal p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
    
    .email-login input {
      width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333;
      background: rgba(255,255,255,0.05); color: white; box-sizing: border-box;
    }
    .email-login button {
      width: 100%; padding: 15px; border-radius: 10px; border: none;
      background: linear-gradient(90deg, #a855f7, #fbbf24); color: white; font-weight: bold;
      cursor: pointer; margin-bottom: 20px; font-size: 1rem;
    }
    
    .divider {
      display: flex; align-items: center; text-align: center; margin: 20px 0; color: #555; font-size: 0.8rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; margin: 0 10px; }
    
    .sns-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    .sns-btn {
      width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold;
      transition: transform 0.2s;
    }
    .sns-btn:hover { transform: scale(1.1); }
    .btn-kakao { background-color: #FEE500; color: #000; }
    .btn-naver { background-color: #03C75A; color: #fff; }
    .btn-google { background-color: #fff; color: #000; }
    .btn-apple { background-color: #000; color: #fff; border: 1px solid #333; }

    .close-btn {
      position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #666; cursor: pointer;
    }
    .close-btn:hover { color: white; }
  </style>
</head>
<body>

  <img id="studioImage" src="studio.jpg" alt="방송국 스튜디오">

  <header>
    <div class="logo">APPVERZE<span>.</span></div>
    <div class="nav-buttons">
      <a href="#" class="lounge-btn">LOUNGE HUB</a>
      <button class="login-btn" id="openLoginBtn">LOGIN / JOIN</button>
      
      <div class="wallet-display" id="walletDisplay">
        <span class="coin-icon">💎</span>
        <span class="coin-amount">1,000 APV</span>
      </div>
    </div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="친구야 안녕? 이라고 말을 걸어보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>

  <div id="modalOverlay"></div>
  <div id="loginModal">
    <span class="close-btn" id="closeLoginBtn">&times;</span>
    <h2>AI GATEWAY</h2>
    <p>미래의 블록체인 생태계, 앱버즈에 오신 것을 환영합니다.</p>
    
    <div class="email-login">
      <input type="email" placeholder="이메일 주소">
      <input type="password" placeholder="비밀번호 설정">
      <button onclick="simulateLogin('이메일')">APPVERZE 시작하기</button>
    </div>

    <div class="divider">또는 빠른 연계 가입</div>

    <div class="sns-buttons">
      <button class="sns-btn btn-kakao" onclick="simulateLogin('카카오')" title="카카오톡으로 시작">K</button>
      <button class="sns-btn btn-naver" onclick="simulateLogin('네이버')" title="네이버로 시작">N</button>
      <button class="sns-btn btn-google" onclick="simulateLogin('구글')" title="구글로 시작">G</button>
      <button class="sns-btn btn-apple" onclick="simulateLogin('애플')" title="애플로 시작"></button>
    </div>
  </div>

  <script>
    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const submitBtn = document.getElementById('submitBtn');
    const studioImage = document.getElementById('studioImage');
    const title = document.getElementById('mainTitle');
    const searchBox = document.getElementById('searchBox');

    // 모달창 및 지갑 컨트롤
    const openLoginBtn = document.getElementById('openLoginBtn');
    const closeLoginBtn = document.getElementById('closeLoginBtn');
    const loginModal = document.getElementById('loginModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const walletDisplay = document.getElementById('walletDisplay');

    openLoginBtn.addEventListener('click', () => {
      loginModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      
      chatBox.innerHTML = '';
      setTimeout(() => {
        const yinMessage = document.createElement('div');
        yinMessage.className = 'ai-message yin-msg';
        yinMessage.innerHTML = `<strong>Yin (감성):</strong> 환영합니다! 당신의 감정과 데이터를 소중히 지킬게요. 💜`;
        chatBox.appendChild(yinMessage);
      }, 300);
    });

    function closeModal() {
      loginModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    }
    closeLoginBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);

    // 가입 버튼을 눌렀을 때 작동하는 '지갑 생성 & 코인 지급' 마법!
    function simulateLogin(method) {
      closeModal(); 
      chatBox.innerHTML = ''; 

      // 1. 로그인 버튼을 숨기고, 💎 지갑을 화면에 짠! 하고 나타나게 합니다.
      openLoginBtn.style.display = 'none';
      walletDisplay.style.display = 'flex';

      // 2. Yang AI의 지갑 생성 보고
      setTimeout(() => {
        const yangMessage = document.createElement('div');
        yangMessage.className = 'ai-message yang-msg';
        yangMessage.innerHTML = `<strong>Yang (실행):</strong> [${method}] 인증 완료. 향후 블록체인(Web3) 연동을 위한 보안 지갑(Wallet) 생성을 완료했습니다. ⚡`;
        chatBox.appendChild(yangMessage);
      }, 500);

      // 3. Yin AI의 코인 에어드랍(지급) 안내
      setTimeout(() => {
        const yinMessage = document.createElement('div');
        yinMessage.className = 'ai-message yin-msg';
        yinMessage.innerHTML = `<strong>Yin (감성):</strong> 첫 입장을 축하드려요! 웰컴 보상으로 <strong>1,000 APV 토큰</strong>을 지갑에 넣어드렸어요. 나중에 진짜 가상화폐로 바꿀 수 있게 잘 보관해 둘게요! 💜`;
        chatBox.appendChild(yinMessage);
      }, 2500);
    }

    // 기존 방송국 생성 코드
    function triggerAI() {
      if (inputField.value.trim() !== '') {
        const userText = inputField.value;
        inputField.value = '';
        chatBox.innerHTML = ''; 

        if(userText.includes('방송국')) {
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = `<strong>Yin (감성):</strong> 와! 대형 유튜브 방송국이라니 너무 기대돼요! 멋진 무대와 조명을 세팅해 드릴게요. 💜`;
            chatBox.appendChild(yinMessage);
          }, 500);

          setTimeout(() => {
            const yangMessage = document.createElement('div');
            yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = `<strong>Yang (실행):</strong> 메인 무대, 관객석 구조 분석 완료. 3D 스튜디오 룸 데이터를 로드합니다! ⚡`;
            chatBox.appendChild(yangMessage);

            setTimeout(() => {
              title.style.opacity = '0'; 
              studioImage.style.opacity = '1'; /* 사진이 뚜렷하게 보이도록 수정 */
              searchBox.style.transform = 'translateY(150px)'; 
            }, 1000);
          }, 2500);
        } else {
          setTimeout(() => {
            const yinMessage = document.createElement('div');
            yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = `<strong>Yin (감성):</strong> 네! 어떤 공간(Room)을 상상하고 계신가요? 💜`;
            chatBox.appendChild(yinMessage);
          }, 500);
        }
      }
    }

    inputField.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') triggerAI();
    });
    submitBtn.addEventListener('click', triggerAI);
  </script>
</body>
</html>
