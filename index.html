<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - SECURE CORE</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { margin: 0; padding: 0; background-color: #0b0b0f; color: white; font-family: 'Pretendard', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* 🚀 홀로그램 룸 */
    #holodeck { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050508; perspective: 1000px; opacity: 0; z-index: 1; transition: opacity 1.5s ease-in-out; pointer-events: none; overflow: hidden; }
    .grid-floor { position: absolute; bottom: -80%; left: -50%; width: 200%; height: 200%; background-image: linear-gradient(rgba(168, 85, 247, 0.7) 2px, transparent 2px), linear-gradient(90deg, rgba(168, 85, 247, 0.7) 2px, transparent 2px); background-size: 80px 80px; transform: rotateX(80deg); animation: gridMove 2s linear infinite; }
    .fade-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #050508 30%, transparent 100%); z-index: 2; }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

    header, main { position: relative; z-index: 10; pointer-events: auto; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; color: white; text-decoration: none; cursor: pointer; } .logo span { color: #fbbf24; }
    .nav-buttons { display: flex; gap: 15px; align-items: center; }
    .lounge-btn, .login-btn { padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
    .lounge-btn { background-color: white; color: black; text-decoration: none; }
    .login-btn { background-color: #a855f7; color: white; border: 1px solid #a855f7; }

    /* 전광판 */
    .billboard { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); padding: 10px 30px; background: rgba(10, 10, 15, 0.85); border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 40px; backdrop-filter: blur(15px); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 25px; z-index: 100; white-space: nowrap; }
    .billboard-title { font-size: 0.8rem; color: #ccc; letter-spacing: 1px; font-weight: bold; margin: 0; } .billboard-title span { color: #a855f7; }
    .billboard-data { display: flex; gap: 25px; align-items: center; }
    .data-box { display: flex; flex-direction: row; align-items: baseline; gap: 8px; }
    .data-label { font-size: 0.7rem; color: #888; } .data-value { font-size: 1.1rem; font-weight: 900; font-family: monospace; }
    .user-val { color: #38bdf8; } .ai-val { color: #c084fc; } .price-val { color: #fbbf24; }
    .pulse { animation: pulseGold 2s infinite; }
    @keyframes pulseGold { 0% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); } 50% { text-shadow: 0 0 20px rgba(251, 191, 36, 0.8); } 100% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); } }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .title { font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; transition: opacity 1.5s ease; pointer-events: none; }
    .title .dot { color: #fbbf24; }

    .input-wrapper { position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; z-index: 20; }
    input[type="text"] { width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333; background-color: rgba(255, 255, 255, 0.05); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; backdrop-filter: blur(10px); }
    .submit-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer; }

    #chatContainer { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
    .msg-wrapper { display: flex; gap: 15px; align-items: flex-start; opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .ai-video-box { width: 130px; height: 130px; border-radius: 50%; background-color: #111; flex-shrink: 0; border: 3px solid #a855f7; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(168,85,247,0.4); }
    .ai-video-box video, .ai-video-box img { width: 100%; height: 100%; object-fit: cover; }
    .yang-video-box { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.4); }

    .ai-message { padding: 15px 20px; border-radius: 0 12px 12px 12px; color: white; font-size: 1.1rem; backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85); line-height: 1.6; border: 1px solid rgba(255,255,255,0.1); flex: 1; }
    #loadingText { display: none; position: absolute; top: -30px; left: 0; width: 100%; text-align: center; color: #fbbf24; font-weight: bold; font-size: 1rem; animation: blink 1s infinite; text-shadow: 0 0 10px rgba(251,191,36,0.8); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #didAgentPanel {
      display: none;
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 360px;
      height: 520px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(8, 8, 14, 0.88);
      box-shadow: 0 12px 36px rgba(0,0,0,0.45);
      z-index: 120;
    }
    #didAgentPanel iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    /* Mobile optimization */
    @media (max-width: 768px) {
      header { padding: 16px 14px; }
      .logo { font-size: 1.1rem; }
      .login-btn { padding: 8px 12px; font-size: 0.75rem; }

      .billboard {
        top: 10px;
        width: calc(100% - 16px);
        padding: 8px 10px;
        gap: 10px;
      }
      .billboard-title { font-size: 0.64rem; }
      .billboard-data { gap: 10px; }
      .data-label { font-size: 0.58rem; }
      .data-value { font-size: 0.8rem; }

      .title {
        font-size: 2.25rem;
        margin-top: 24px;
        margin-bottom: 14px;
      }

      #chatContainer {
        top: 14%;
        width: 94%;
        gap: 12px;
      }
      .msg-wrapper { gap: 10px; }
      .ai-video-box { width: 84px; height: 84px; border-width: 2px; }
      .ai-message { font-size: 0.92rem; padding: 12px; }

      .input-wrapper { width: 94%; }
      input[type="text"] { padding: 14px 16px; font-size: 0.95rem; }
      .submit-btn { width: 30px; height: 30px; right: 10px; }

      #loadingText { top: -24px; font-size: 0.82rem; }
      #didAgentPanel {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
        height: 46vh;
      }
    }
  </style>
</head>
<body>
  <div id="holodeck"><div class="fade-cover"></div><div class="grid-floor"></div></div>

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span>ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box"><span class="data-label">HUMAN</span><span class="data-value user-val" id="userCounter">15,420</span></div>
      <div class="data-box"><span class="data-label">AI NODES</span><span class="data-value ai-val" id="aiCounter">1,204,530</span></div>
      <div class="data-box"><span class="data-label">APV VALUE</span><span class="data-value price-val pulse" id="valueCounter">$ 1.0024</span></div>
    </div>
  </div>

  <header>
    <a href="/" class="logo">APPVERZE<span>.</span></a>
    <div class="nav-buttons"><button class="login-btn">LOGIN</button></div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    <div class="input-wrapper" id="searchBox">
      <div id="loadingText">🚀 자체 보안 서버를 통해 영상을 렌더링 중입니다... (약 10초)</div>
      <input type="text" id="chatInput" placeholder="방을 만들거나, Yin에게 아무 말이나 걸어보세요!">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>
  <div id="didAgentPanel">
    <iframe id="didAgentFrame" title="D-ID Agent" allow="camera; microphone; autoplay; clipboard-write"></iframe>
  </div>

  <script>
    // 🚨 여기서 API 키는 완전히 사라졌습니다! 해커가 절대 훔쳐갈 수 없습니다. 🚨
    const YIN_IMAGE = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&h=500&fit=crop";
    const YANG_IMAGE = "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=500&h=500&fit=crop";

    let currentUsers = 15420; let currentAINodes = 1204530; let currentValue = 1.0024;
    setInterval(() => {
      currentUsers += Math.floor(Math.random() * 3); currentAINodes += Math.floor(Math.random() * 40) + 10; currentValue += 0.0005;
      document.getElementById('userCounter').innerText = currentUsers.toLocaleString();
      document.getElementById('aiCounter').innerText = currentAINodes.toLocaleString();
      document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4);
    }, 3000);

    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const loadingText = document.getElementById('loadingText');
    const title = document.getElementById('mainTitle');
    const holodeck = document.getElementById('holodeck');
    const searchBox = document.getElementById('searchBox');
    const submitBtn = document.getElementById('submitBtn');
    const didAgentPanel = document.getElementById('didAgentPanel');
    const didAgentFrame = document.getElementById('didAgentFrame');
    const didAgentUrl = "https://studio.d-id.com/agents/share?id=v2_agt_J-EKRcqE&utm_source=copy&key=WjI5dloyeGxMVzloZFhSb01ud3hNRGs0TURrMk9ETTJNamc0TmprMU9URXhNRGM2TmtaVVNFdGpPVTAwU0dKd1EwTkhWWFpWYnpKVw==";

    function appendFallbackMessage(name, imgSrc, boxClass, textToSay, triggerHolodeck) {
      const msgWrapper = document.createElement('div');
      msgWrapper.className = 'msg-wrapper';
      msgWrapper.innerHTML = `
        <div class="ai-video-box ${boxClass}">
          <img src="${imgSrc}" alt="${name}">
        </div>
        <div class="ai-message"><strong>${name}:</strong> ${textToSay}</div>
      `;
      chatBox.appendChild(msgWrapper);

      if (triggerHolodeck) {
        title.style.opacity = '0';
        holodeck.style.opacity = '1';
        searchBox.style.transform = 'translateY(150px)';
      }
    }

    // 🚀 해킹 방지! Vercel 전용 백엔드 서버(/api/did)와 통신하는 함수
    async function addRealVideoMessage(name, imgSrc, boxClass, textToSay, voiceId, triggerHolodeck) {
      loadingText.style.display = 'block';
      inputField.disabled = true;

      try {
        // 1. 우리만의 안전한 Vercel 서버로 요청 (여기엔 API 키가 없습니다!)
        const createRes = await fetch('/api/did', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            script: { type: 'text', input: textToSay, provider: { type: 'microsoft', voice_id: voiceId } },
            source_url: imgSrc
          })
        });

        if (!createRes.ok) {
          throw new Error('D-ID API endpoint unavailable');
        }

        const createData = await createRes.json();
        const talkId = createData.id;

        if(!talkId) {
          throw new Error('D-ID response missing id');
        }

        // 2. Vercel 서버를 통해 영상 완료 여부 확인
        let videoUrl = null;
        while (!videoUrl) {
          await new Promise(resolve => setTimeout(resolve, 2000)); 
          const checkRes = await fetch(`/api/did?id=${talkId}`);
          const checkData = await checkRes.json();

          if (checkData.status === 'done') {
            videoUrl = checkData.result_url; 
          } else if (checkData.status === 'error') {
            throw new Error('D-ID rendering failed');
          }
        }

        loadingText.style.display = 'none';
        inputField.disabled = false;
        inputField.focus();

        if (videoUrl) {
          const msgWrapper = document.createElement('div');
          msgWrapper.className = 'msg-wrapper';
          msgWrapper.innerHTML = `
            <div class="ai-video-box ${boxClass}">
              <video src="${videoUrl}" autoplay controls></video>
            </div>
            <div class="ai-message"><strong>${name}:</strong> ${textToSay}</div>
          `;
          chatBox.appendChild(msgWrapper);

          if(triggerHolodeck) {
            title.style.opacity = '0'; holodeck.style.opacity = '1'; searchBox.style.transform = 'translateY(150px)';
          }
        }

      } catch (error) {
        console.error(error);
        // D-ID API가 없어도 UX가 멈추지 않도록 즉시 폴백 렌더링
        appendFallbackMessage(name, imgSrc, boxClass, textToSay, triggerHolodeck);
        loadingText.style.display = 'none';
        inputField.disabled = false;
        inputField.focus();
      }
    }

    function triggerChat() {
      if (inputField.value.trim() !== '') {
        const userText = inputField.value; inputField.value = ''; chatBox.innerHTML = ''; 

        if(userText.includes('방') || userText.includes('룸') || userText.includes('방송국')) {
          appendFallbackMessage('Yang (실행)', YANG_IMAGE, 'yang-video-box', `명령어 확인. 코어 엔진 가동, 3D 룸과 D-ID 캐릭터를 활성화합니다!`, true);
          if (didAgentFrame && !didAgentFrame.src) didAgentFrame.src = didAgentUrl;
          if (didAgentPanel) didAgentPanel.style.display = 'block';
        } else {
          title.style.opacity = '0'; searchBox.style.transform = 'translateY(150px)';
          addRealVideoMessage('Yin (감성)', YIN_IMAGE, '', `안녕하세요! "${userText}" 라고 말씀하셨군요. 저는 앱버즈의 감성 AI Yin입니다. 제 입모양이 움직이는 게 보이시나요?`, 'ko-KR-SunHiNeural', false);
        }
      }
    }

    inputField.addEventListener('keypress', function (e) { if (e.key === 'Enter') triggerChat(); });
    submitBtn.addEventListener('click', triggerChat);
  </script>
</body>
</html>
