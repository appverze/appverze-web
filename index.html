<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0; padding: 0; background-color: #0b0b0f; color: white;
      font-family: 'Pretendard', sans-serif; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    #studioImage {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0; z-index: 1; transition: opacity 1.5s ease-in-out;
    }

    header, main { position: relative; z-index: 10; }
    
    header {
      display: flex; justify-content: space-between; align-items: center; padding: 30px 50px;
    }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
    .logo span { color: #fbbf24; }
    
    .nav-buttons { display: flex; gap: 15px; align-items: center; }
    .lounge-btn {
      padding: 10px 20px; border-radius: 30px; background-color: white; color: black;
      font-weight: bold; text-decoration: none; font-size: 0.9rem;
    }
    .login-btn {
      padding: 10px 20px; border-radius: 30px; background-color: #a855f7; color: white;
      font-weight: bold; text-decoration: none; font-size: 0.9rem; border: 1px solid #a855f7; cursor: pointer;
    }
    
    .wallet-display {
      display: none; align-items: center; gap: 8px; padding: 8px 20px;
      border-radius: 30px; background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.5); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
    }
    .coin-icon { font-size: 1.2rem; }
    .coin-amount { font-weight: bold; color: #fbbf24; font-size: 1rem; }

    main {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    .title {
      font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; transition: opacity 1.5s ease; 
    }
    .title .dot { color: #fbbf24; }

    .input-wrapper {
      position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; z-index: 20;
    }
    
    input[type="text"] {
      width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05); color: white; font-size: 1.1rem;
      outline: none; box-sizing: border-box; backdrop-filter: blur(10px);
    }
    
    .submit-btn {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer;
    }

    /* =========================================
       새로 추가된 '글로벌 경제 전광판(Billboard)' 
       ========================================= */
    .billboard {
      margin-top: 40px;
      padding: 20px 40px;
      background: rgba(10, 10, 15, 0.8);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(168, 85, 247, 0.1);
      text-align: center;
      transition: transform 1.5s ease;
      z-index: 10;
    }
    .billboard-title {
      font-size: 0.9rem; color: #aaa; letter-spacing: 2px; margin-bottom: 15px; font-weight: bold;
    }
    .billboard-title span { color: #a855f7; }
    
    .billboard-data {
      display: flex; gap: 40px; justify-content: center; align-items: center;
    }
    .data-box { display: flex; flex-direction: column; gap: 5px; }
    .data-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
    .data-value { font-size: 2rem; font-weight: 900; font-family: monospace; letter-spacing: 1px; }
    
    .supply-val { color: #fff; }
    .price-val { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    .pulse { animation: pulseGreen 2s infinite; }

    @keyframes pulseGreen {
      0% { text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
      50% { text-shadow: 0 0 20px rgba(16, 185, 129, 0.8); }
      100% { text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
    }

    #chatContainer {
      position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
      width: 80%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; z-index: 100;
    }
    .ai-message {
      padding: 20px; border-radius: 12px; color: white; font-size: 1.1rem;
      backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85);
      animation: fadeUp 0.5s forwards; line-height: 1.6;
    }
    .yin-msg { border-left: 5px solid #a855f7; }
    .yang-msg { border-left: 5px solid #fbbf24; }

    /* 모달창 스타일 (생략 없이 포함) */
    #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    #loginModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; padding: 40px; border-radius: 20px; background: rgba(15,15,20,0.9); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 40px rgba(168,85,247,0.2); z-index: 1000; text-align: center; }
    #loginModal h2 { margin: 0 0 10px 0; font-weight: 900; }
    #loginModal p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
    .sns-buttons { display: flex; justify-content: center; gap: 15px; }
    .sns-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    .btn-kakao { background-color: #FEE500; color: #000; } .btn-naver { background-color: #03C75A; color: #fff; } .btn-apple { background-color: #000; color: #fff; border: 1px solid #333; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #666; cursor: pointer; }
  </style>
</head>
<body>

  <img id="studioImage" src="studio.jpg" alt="방송국 스튜디오">

  <header>
    <div class="logo">APPVERZE<span>.</span></div>
    <div class="nav-buttons">
      <a href="#" class="lounge-btn">LOUNGE HUB</a>
      <button class="login-btn" id="openLoginBtn">LOGIN / JOIN</button>
      <div class="wallet-display" id="walletDisplay">
        <span class="coin-icon">💎</span><span class="coin-amount">1,000 APV</span>
      </div>
    </div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="친구야 안녕? 이라고 말을 걸어보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>

    <div class="billboard" id="supplyBillboard">
      <div class="billboard-title">🌐 APPVERZE <span>GLOBAL ECONOMY</span> (인구 페깅 시스템)</div>
      <div class="billboard-data">
        <div class="data-box">
          <span class="data-label">글로벌 인구 = 총 발행량 (APV)</span>
          <span class="data-value supply-val" id="populationCounter">8,102,453,921</span>
        </div>
        <div class="data-box">
          <span class="data-label">가치 연동 (디플레이션 업)</span>
          <span class="data-value price-val pulse" id="valueCounter">$ 1.0024 ▲</span>
        </div>
      </div>
    </div>
  </main>

  <div id="modalOverlay"></div>
  <div id="loginModal">
    <span class="close-btn" id="closeLoginBtn">&times;</span>
    <h2>AI GATEWAY</h2>
    <p>미래의 경제 생태계, 앱버즈에 오신 것을 환영합니다.</p>
    <div class="sns-buttons">
      <button class="sns-btn btn-kakao" onclick="simulateLogin('카카오')">K</button>
      <button class="sns-btn btn-naver" onclick="simulateLogin('네이버')">N</button>
      <button class="sns-btn btn-apple" onclick="simulateLogin('애플')"></button>
    </div>
  </div>

  <script>
    /* 전광판 실시간 숫자 변동 마법 (인구 감소 = 가치 상승 시뮬레이션) */
    let currentPopulation = 8102453921;
    let currentValue = 1.0024;
    
    setInterval(() => {
      // 인구수가 1~5명씩 랜덤하게 줄어드는 것을 시뮬레이션
      const decrease = Math.floor(Math.random() * 5) + 1;
      currentPopulation -= decrease;
      
      // 인구가 줄어들면 코인 가치는 미세하게 상승!
      currentValue += (decrease * 0.00001);

      document.getElementById('populationCounter').innerText = currentPopulation.toLocaleString();
      document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4) + " ▲";
    }, 3000); // 3초마다 업데이트

    // 로그인 및 챗봇 로직
    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const submitBtn = document.getElementById('submitBtn');
    const studioImage = document.getElementById('studioImage');
    const title = document.getElementById('mainTitle');
    const searchBox = document.getElementById('searchBox');
    const billboard = document.getElementById('supplyBillboard');

    const openLoginBtn = document.getElementById('openLoginBtn');
    const closeLoginBtn = document.getElementById('closeLoginBtn');
    const loginModal = document.getElementById('loginModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const walletDisplay = document.getElementById('walletDisplay');

    openLoginBtn.addEventListener('click', () => {
      loginModal.style.display = 'block'; modalOverlay.style.display = 'block';
    });
    function closeModal() { loginModal.style.display = 'none'; modalOverlay.style.display = 'none'; }
    closeLoginBtn.addEventListener('click', closeModal); modalOverlay.addEventListener('click', closeModal);

    function simulateLogin(method) {
      closeModal(); chatBox.innerHTML = ''; 
      openLoginBtn.style.display = 'none'; walletDisplay.style.display = 'flex';

      setTimeout(() => {
        const yangMessage = document.createElement('div'); yangMessage.className = 'ai-message yang-msg';
        yangMessage.innerHTML = `<strong>Yang (실행):</strong> [${method}] 인증 완료. 인구 페깅 기반 APV 보안 지갑(Wallet) 생성을 완료했습니다. ⚡`;
        chatBox.appendChild(yangMessage);
      }, 500);

      setTimeout(() => {
        const yinMessage = document.createElement('div'); yinMessage.className = 'ai-message yin-msg';
        yinMessage.innerHTML = `<strong>Yin (감성):</strong> 환영해요! 첫 보상으로 <strong>1,000 APV 토큰</strong>을 드렸어요. 전 세계 인구에 따라 당신의 자산 가치가 올라갈 거예요! 💜`;
        chatBox.appendChild(yinMessage);
