<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0; padding: 0; background-color: #0b0b0f; color: white;
      font-family: 'Pretendard', sans-serif; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    #studioImage { display: none; }

    /* =========================================
       무적의 3D 액자(Iframe) 컨테이너 세팅!
       ========================================= */
    #splineContainer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; opacity: 0; transition: opacity 2s ease-in-out;
      pointer-events: none; 
      display: flex; justify-content: center; align-items: center;
    }

    /* 3D 파일이 무거울 때 나타나는 로딩 글씨 */
    .loading-text {
      position: absolute;
      color: #fbbf24; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
      animation: blink 1.5s infinite; z-index: 1;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 본사 서버 화면을 그대로 비춰주는 액자 */
    #splineContainer iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2;
    }

    header, main { position: relative; z-index: 10; pointer-events: auto; }
    
    header {
      display: flex; justify-content: space-between; align-items: center; padding: 30px 50px;
    }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
    .logo span { color: #fbbf24; }
    
    .nav-buttons { display: flex; gap: 15px; align-items: center; }
    .lounge-btn {
      padding: 10px 20px; border-radius: 30px; background-color: white; color: black; font-weight: bold; text-decoration: none; font-size: 0.9rem;
    }
    .login-btn {
      padding: 10px 20px; border-radius: 30px; background-color: #a855f7; color: white; font-weight: bold; text-decoration: none; font-size: 0.9rem; border: 1px solid #a855f7; cursor: pointer;
    }
    
    .wallet-display {
      display: none; align-items: center; gap: 8px; padding: 8px 20px; border-radius: 30px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(251, 191, 36, 0.5); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
    }
    .coin-icon { font-size: 1.2rem; }
    .coin-amount { font-weight: bold; color: #fbbf24; font-size: 1rem; }

    .billboard {
      position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
      padding: 10px 30px; background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(168, 85, 247, 0.2);
      display: flex; align-items: center; gap: 25px; z-index: 100; white-space: nowrap;
      pointer-events: none;
    }
    .billboard-title { font-size: 0.8rem; color: #ccc; letter-spacing: 1px; font-weight: bold; margin: 0; }
    .billboard-title span { color: #a855f7; }
    .billboard-data { display: flex; gap: 25px; align-items: center; }
    .data-box { display: flex; flex-direction: row; align-items: baseline; gap: 8px; }
    .data-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    .data-value { font-size: 1.1rem; font-weight: 900; font-family: monospace; letter-spacing: 1px; transition: color 0.3s; }
    
    .user-val { color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5); }
    .ai-val { color: #c084fc; text-shadow: 0 0 8px rgba(192, 132, 252, 0.5); }
    .price-val { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    .pulse { animation: pulseGold 2s infinite; }

    @keyframes pulseGold { 0% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); } 50% { text-shadow: 0 0 20px rgba(251, 191, 36, 0.8); } 100% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); } }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    .title { font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; transition: opacity 1.5s ease; pointer-events: none; }
    .title .dot { color: #fbbf24; }

    .input-wrapper { position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; z-index: 2000; pointer-events: auto; }
    
    input[type="text"] { width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333; background-color: rgba(255, 255, 255, 0.05); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; backdrop-filter: blur(10px); }
    .submit-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer; }

    #chatContainer { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; z-index: 100; pointer-events: none; }
    .ai-message { padding: 20px; border-radius: 12px; color: white; font-size: 1.1rem; backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85); animation: fadeUp 0.5s forwards; line-height: 1.6; }
    .yin-msg { border-left: 5px solid #a855f7; }
    .yang-msg { border-left: 5px solid #fbbf24; }

    #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    #loginModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; padding: 40px; border-radius: 20px; background: rgba(15,15,20,0.9); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 40px rgba(168,85,247,0.2); z-index: 1000; text-align: center; }
    #loginModal h2 { margin: 0 0 10px 0; font-weight: 900; }
    #loginModal p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
    .sns-buttons { display: flex; justify-content: center; gap: 15px; }
    .sns-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    .btn-kakao { background-color: #FEE500; color: #000; } .btn-naver { background-color: #03C75A; color: #fff; } .btn-apple { background-color: #000; color: #fff; border: 1px solid #333; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #666; cursor: pointer; }
  </style>
</head>
<body>

  <div id="splineContainer">
    <div class="loading-text">🚀 3D 엔진 데이터 로딩 중... (최대 10초)</div>
    <iframe src="https://my.spline.design/miniroomartcopy-c8d19d7e5d59f77f985ddcfd9e80e227/" frameborder="0" width="100%" height="100%"></iframe>
  </div>

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span>ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box"><span class="data-label">HUMAN USERS</span><span class="data-value user-val" id="userCounter">15,420</span></div>
      <div class="data-box"><span class="data-label">AI NODES</span><span class="data-value ai-val" id="aiCounter">1,204,530</span></div>
      <div class="data-box"><span class="data-label">APV VALUE</span><span class="data-value price-val pulse" id="valueCounter">$ 1.0024 ▲</span></div>
    </div>
  </div>

  <header>
    <div class="logo">APPVERZE<span>.</span></div>
    <div class="nav-buttons">
      <a href="#" class="lounge-btn">LOUNGE HUB</a>
      <button type="button" class="login-btn" id="openLoginBtn">LOGIN / JOIN</button>
      <div class="wallet-display" id="walletDisplay"><span class="coin-icon">💎</span><span class="coin-amount">1,000 APV</span></div>
    </div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="친구야 안녕? 이라고 말을 걸어보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>

  <div id="modalOverlay"></div>
  <div id="loginModal">
    <span class="close-btn" id="closeLoginBtn">&times;</span>
    <h2>AI GATEWAY</h2>
    <p>인간과 AI가 함께 만드는 경제 생태계에 오신 것을 환영합니다.</p>
    <div class="sns-buttons">
      <button class="sns-btn btn-kakao" onclick="simulateLogin('카카오')">K</button>
      <button class="sns-btn btn-naver" onclick="simulateLogin('네이버')">N</button>
      <button class="sns-btn btn-apple" onclick="simulateLogin('애플')"></button>
    </div>
  </div>

  <script>
    /* 경제 시스템 로직 */
    let currentUsers = 15420; let currentAINodes = 1204530; let currentValue = 1.0024;
    function updateBillboard() { document.getElementById('userCounter').innerText = currentUsers.toLocaleString(); document.getElementById('aiCounter').innerText = currentAINodes.toLocaleString(); document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4) + " ▲"; }
    setInterval(() => { const userIncrease = Math.floor(Math.random() * 3); const aiIncrease = Math.floor(Math.random() * 40) + 10; currentUsers += userIncrease; currentAINodes += aiIncrease; currentValue += (aiIncrease * 0.00005) + (userIncrease * 0.0005); updateBillboard(); }, 3000); 

    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const submitBtn = document.getElementById('submitBtn');
    const title = document.getElementById('mainTitle');
    const searchBox = document.getElementById('searchBox');
    const splineContainer = document.getElementById('splineContainer');

    const openLoginBtn = document.getElementById('openLoginBtn');
    const closeLoginBtn = document.getElementById('closeLoginBtn');
    const loginModal = document.getElementById('loginModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const walletDisplay = document.getElementById('walletDisplay');

    openLoginBtn.addEventListener('click', () => { loginModal.style.display = 'block'; modalOverlay.style.display = 'block'; });
    function closeModal() { loginModal.style.display = 'none'; modalOverlay.style.display = 'none'; }
    closeLoginBtn.addEventListener('click', closeModal); modalOverlay.addEventListener('click', closeModal);

    function simulateLogin(method) {
      closeModal(); chatBox.innerHTML = ''; openLoginBtn.style.display = 'none'; walletDisplay.style.display = 'flex';
      currentUsers += 1; currentValue += 0.0050; updateBillboard();
      
      setTimeout(() => { const yangMessage = document.createElement('div'); yangMessage.className = 'ai-message yang-msg'; yangMessage.innerHTML = `<strong>Yang (실행):</strong> [${method}] 인간 유저 1명 추가 동기화 완료. 생태계 가치 상승이 전광판에 반영되었습니다. ⚡`; chatBox.appendChild(yangMessage); }, 500);
      setTimeout(() => { const yinMessage = document.createElement('div'); yinMessage.className = 'ai-message yin-msg'; yinMessage.innerHTML = `<strong>Yin (감성):</strong> 환영해요! 첫 보상 <strong>1,000 APV 토큰</strong> 지급 완료 💜`; chatBox.appendChild(yinMessage); }, 2500);
    }

    function triggerAI() {
      if (inputField.value.trim() !== '') {
        const userText = inputField.value; inputField.value = ''; chatBox.innerHTML = ''; 

        if(userText.includes('방송국') || userText.includes('3d') || userText.includes('3D') || userText.includes('방')) {
          setTimeout(() => {
            const yangMessage = document.createElement('div'); yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = `<strong>Yang (실행):</strong> 외부 3D 엔진(Spline) Iframe 연동 확인. 실시간 3D 공간을 비춥니다! ⚡`;
            chatBox.appendChild(yangMessage);

            setTimeout(() => {
              title.style.opacity = '0'; 
              
              /* 마법의 스위치 켜기 */
              splineContainer.style.opacity = '1'; 
              splineContainer.style.pointerEvents = 'auto'; /* 마우스 조작 가능! */

              searchBox.style.transform = 'translateY(150px)'; 
            }, 1000);
          }, 500);
        } else {
          setTimeout(() => { const yinMessage = document.createElement('div'); yinMessage.className = 'ai-message yin-msg'; yinMessage.innerHTML = `<strong>Yin (감성):</strong> 네! 어떤 공간(Room)을 상상하고 계신가요? 💜`; chatBox.appendChild(yinMessage); }, 500);
        }
      }
    }
    inputField.addEventListener('keypress', function (e) { if (e.key === 'Enter') triggerAI(); });
    submitBtn.addEventListener('click', triggerAI);
  </script>
</body>
</html>
