<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPVERZE - CONNECT</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      margin: 0; padding: 0; background-color: #0b0b0f; color: white;
      font-family: 'Pretendard', sans-serif; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    #studioImage {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0; z-index: 1; transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    header, main { position: relative; z-index: 10; }
    
    header {
      display: flex; justify-content: space-between; align-items: center; padding: 30px 50px;
      position: relative; z-index: 5000; pointer-events: none;
    }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; pointer-events: auto; }
    .logo span { color: #fbbf24; }
    
    .nav-buttons { display: flex; gap: 15px; align-items: center; pointer-events: auto; position: relative; z-index: 5000; }
    .lounge-btn {
      padding: 10px 20px; border-radius: 30px; background-color: white; color: black;
      font-weight: bold; text-decoration: none; font-size: 0.9rem; pointer-events: auto;
    }
    .login-btn {
      padding: 10px 20px; border-radius: 30px; background-color: #a855f7; color: white;
      font-weight: bold; text-decoration: none; font-size: 0.9rem; border: 1px solid #a855f7; cursor: pointer;
      position: relative; z-index: 5000; pointer-events: auto;
    }
    
    .wallet-display {
      display: none; align-items: center; gap: 8px; padding: 8px 20px;
      border-radius: 30px; background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.5); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
    }
    .coin-icon { font-size: 1.2rem; }
    .coin-amount { font-weight: bold; color: #fbbf24; font-size: 1rem; }

    /* =========================================
       유저 + AI + 코인 가치 (3단 콤보 전광판)
       ========================================= */
    .billboard {
      position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
      padding: 10px 30px; background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(168, 85, 247, 0.2);
      display: flex; align-items: center; gap: 25px; z-index: 1000; white-space: nowrap;
      pointer-events: none;
    }
    
    .billboard-title {
      font-size: 0.8rem; color: #ccc; letter-spacing: 1px; font-weight: bold; margin: 0;
    }
    .billboard-title span { color: #a855f7; }
    
    .billboard-data { display: flex; gap: 25px; align-items: center; }
    .data-box { display: flex; flex-direction: row; align-items: baseline; gap: 8px; }
    .data-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    .data-value { font-size: 1.1rem; font-weight: 900; font-family: monospace; letter-spacing: 1px; transition: color 0.3s; }
    
    /* 인간 유저는 생동감 있는 스카이블루 색상! */
    .user-val { color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5); }
    
    /* AI 노드는 신비로운 보랏빛 */
    .ai-val { color: #c084fc; text-shadow: 0 0 8px rgba(192, 132, 252, 0.5); }
    
    /* 화폐 가치는 찬란한 황금빛 */
    .price-val { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    .pulse { animation: pulseGold 2s infinite; }

    @keyframes pulseGold {
      0% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
      50% { text-shadow: 0 0 20px rgba(251, 191, 36, 0.8); }
      100% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
    }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    .title { font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; transition: opacity 1.5s ease; }
    .title .dot { color: #fbbf24; }

    .input-wrapper { position: relative; width: 500px; max-width: 90%; transition: transform 1.5s ease; z-index: 2000; pointer-events: auto; }
    
    input[type="text"] {
      width: 100%; padding: 20px 30px; border-radius: 40px; border: 1px solid #333;
      background-color: rgba(255, 255, 255, 0.05); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; backdrop-filter: blur(10px);
    }
    .submit-btn {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background-color: #fbbf24; border: none; border-radius: 50%; cursor: pointer;
    }

    #chatContainer {
      position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; z-index: 1000;
      pointer-events: none;
    }
    .ai-message {
      padding: 20px; border-radius: 12px; color: white; font-size: 1.1rem; backdrop-filter: blur(15px); background: rgba(20, 20, 25, 0.85); animation: fadeUp 0.5s forwards; line-height: 1.6;
    }
    .yin-msg { border-left: 5px solid #a855f7; }
    .yang-msg { border-left: 5px solid #fbbf24; }

    #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999999; pointer-events: auto; }
    #loginModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; padding: 40px; border-radius: 20px; background: rgba(15,15,20,0.9); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 40px rgba(168,85,247,0.2); z-index: 1000000; text-align: center; pointer-events: auto; }
    #loginModal h2 { margin: 0 0 10px 0; font-weight: 900; }
    #loginModal p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
    .sns-buttons { display: flex; justify-content: center; gap: 15px; }
    .sns-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    .btn-kakao { background-color: #FEE500; color: #000; } .btn-naver { background-color: #03C75A; color: #fff; } .btn-apple { background-color: #000; color: #fff; border: 1px solid #333; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #666; cursor: pointer; }
  </style>
</head>
<body>

  <img id="studioImage" src="studio.jpg" alt="방송국 스튜디오">

  <div class="billboard" id="supplyBillboard">
    <div class="billboard-title">🌐 APPVERZE <span>ECOSYSTEM</span></div>
    <div class="billboard-data">
      <div class="data-box">
        <span class="data-label">HUMAN USERS</span>
        <span class="data-value user-val" id="userCounter">15,420</span>
      </div>
      <div class="data-box">
        <span class="data-label">AI NODES</span>
        <span class="data-value ai-val" id="aiCounter">1,204,530</span>
      </div>
      <div class="data-box">
        <span class="data-label">APV VALUE</span>
        <span class="data-value price-val pulse" id="valueCounter">$ 1.0024 ▲</span>
      </div>
    </div>
  </div>

  <header style="position:relative; z-index:5000; pointer-events:none;">
    <div class="logo" style="pointer-events:auto;">APPVERZE<span>.</span></div>
    <div class="nav-buttons" style="pointer-events:auto;">
      <a href="#" class="lounge-btn" style="position:relative; z-index:5000; pointer-events:auto;">LOUNGE HUB</a>
      <button type="button" class="login-btn" id="openLoginBtn" style="position:relative; z-index:5000; pointer-events:auto; cursor:pointer;" onclick="openLoginModal(); return false;">LOGIN / JOIN</button>
      <div class="wallet-display" id="walletDisplay">
        <span class="coin-icon">💎</span><span class="coin-amount">1,000 APV</span>
      </div>
    </div>
  </header>

  <main>
    <div id="chatContainer"></div>
    <div class="title" id="mainTitle">CONNECT<span class="dot">.</span></div>
    
    <div class="input-wrapper" id="searchBox">
      <input type="text" id="chatInput" placeholder="친구야 안녕? 이라고 말을 걸어보세요">
      <button class="submit-btn" id="submitBtn"></button>
    </div>
  </main>

  <div id="modalOverlay"></div>
  <div id="loginModal">
    <span class="close-btn" id="closeLoginBtn">&times;</span>
    <h2>AI GATEWAY</h2>
    <p>인간과 AI가 함께 만드는 경제 생태계에 오신 것을 환영합니다.</p>
    
    <div class="email-login" style="margin-bottom:20px;">
      <input type="email" id="loginEmail" placeholder="이메일 주소" autocomplete="email" style="width:100%;padding:15px;margin-bottom:10px;border-radius:10px;border:1px solid #333;background:rgba(255,255,255,0.05);color:white;box-sizing:border-box;">
      <input type="password" id="loginPassword" placeholder="비밀번호 설정 (6자 이상)" autocomplete="current-password" style="width:100%;padding:15px;margin-bottom:10px;border-radius:10px;border:1px solid #333;background:rgba(255,255,255,0.05);color:white;box-sizing:border-box;">
      <p id="loginError" style="color:#ef4444;font-size:0.85rem;margin:-5px 0 10px 0;min-height:20px;"></p>
      <button id="emailAuthBtn" onclick="handleEmailAuth()" style="width:100%;padding:15px;border-radius:10px;border:none;background:linear-gradient(90deg,#a855f7,#fbbf24);color:white;font-weight:bold;cursor:pointer;font-size:1rem;">APPVERZE 시작하기</button>
    </div>

    <div style="display:flex;align-items:center;text-align:center;margin:20px 0;color:#555;font-size:0.8rem;"><span style="flex:1;border-bottom:1px solid #333;margin:0 10px;"></span>또는 빠른 연계 가입<span style="flex:1;border-bottom:1px solid #333;margin:0 10px;"></span></div>

    <div class="sns-buttons">
      <button class="sns-btn btn-kakao" onclick="simulateLogin('카카오')">K</button>
      <button class="sns-btn btn-naver" onclick="simulateLogin('네이버')">N</button>
      <button class="sns-btn btn-apple" onclick="simulateLogin('애플')"></button>
    </div>
  </div>

  <script>
    function openLoginModal() {
      const modal = document.getElementById('loginModal');
      const overlay = document.getElementById('modalOverlay');
      if (modal) modal.style.display = 'block';
      if (overlay) overlay.style.display = 'block';
      const errEl = document.getElementById('loginError');
      if (errEl) errEl.textContent = '';
    }

    function closeLoginModal() {
      const modal = document.getElementById('loginModal');
      const overlay = document.getElementById('modalOverlay');
      if (modal) modal.style.display = 'none';
      if (overlay) overlay.style.display = 'none';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    /* 🚀 인간 + AI = 가치 상승의 완벽한 마법 로직 */
    let currentUsers = 15420;     // 사람 방문자 시작 숫자
    let currentAINodes = 1204530; // AI 노드 시작 숫자
    let currentValue = 1.0024;    // 코인 가치 시작 숫자
    
    // 화면을 업데이트 하는 함수
    function updateBillboard() {
      document.getElementById('userCounter').innerText = currentUsers.toLocaleString();
      document.getElementById('aiCounter').innerText = currentAINodes.toLocaleString();
      document.getElementById('valueCounter').innerText = "$ " + currentValue.toFixed(4) + " ▲";
    }

    // 3초마다 전 세계 누군가 방문하고, AI가 늘어나는 시뮬레이션
    setInterval(() => {
      const userIncrease = Math.floor(Math.random() * 3); // 0~2명의 진짜 유저가 가입
      const aiIncrease = Math.floor(Math.random() * 40) + 10; // AI 노드는 10~50개씩 팍팍 증식
      
      currentUsers += userIncrease;
      currentAINodes += aiIncrease;
      
      // 💡 [핵심] 사람 1명의 가치가 AI 1개보다 10배 더 높게 설정하여 코인 가치 펌핑!
      currentValue += (aiIncrease * 0.00005) + (userIncrease * 0.0005);
      
      updateBillboard();
    }, 3000); 

    const inputField = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatContainer');
    const submitBtn = document.getElementById('submitBtn');
    const studioImage = document.getElementById('studioImage');
    const title = document.getElementById('mainTitle');
    const searchBox = document.getElementById('searchBox');

    let supabase = null;
    (async function initSupabase() {
      try {
        const res = await fetch('/api/supabase-config');
        if (!res.ok) throw new Error('Supabase 설정을 불러올 수 없습니다.');
        const { supabaseUrl, supabaseAnonKey } = await res.json();
        supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
      } catch (e) { console.warn('Supabase init:', e.message); }
    })();

    const openLoginBtn = document.getElementById('openLoginBtn');
    const closeLoginBtn = document.getElementById('closeLoginBtn');
    const loginModal = document.getElementById('loginModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const walletDisplay = document.getElementById('walletDisplay');

    openLoginBtn.addEventListener('click', openLoginModal);
    function closeModal() { closeLoginModal(); }
    closeLoginBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);

    function showAuthSuccess(method, isSignUp) {
      closeModal();
      chatBox.innerHTML = '';
      openLoginBtn.style.display = 'none';
      if (walletDisplay) walletDisplay.style.display = 'flex';
      currentUsers += 1;
      currentValue += 0.0050;
      updateBillboard();
      const uc = document.getElementById('userCounter');
      if (uc) { uc.style.color = 'white'; setTimeout(() => { uc.style.color = '#38bdf8'; }, 1000); }
      const msg = isSignUp ? '계정이 생성되었습니다' : '로그인되었습니다';
      setTimeout(() => {
        const m = document.createElement('div');
        m.className = 'ai-message yang-msg';
        m.innerHTML = `<strong>Yang (실행):</strong> [${method}] ${msg}. 활성 AI 네트워크와 연동된 APV 보안 지갑(Wallet)을 생성했습니다. ⚡`;
        chatBox.appendChild(m);
      }, 500);
      setTimeout(() => {
        const yinMessage = document.createElement('div');
        yinMessage.className = 'ai-message yin-msg';
        yinMessage.innerHTML = `<strong>Yin (감성):</strong> 환영해요! 당신이 가입해주신 덕분에 우리 모두의 자산 가치가 더 올랐어요! 첫 보상 <strong>1,000 APV 토큰</strong> 지급 완료 💜`;
        chatBox.appendChild(yinMessage);
      }, 2500);
    }

    function simulateLogin(method) {
      closeModal();
      chatBox.innerHTML = '';
      openLoginBtn.style.display = 'none';
      if (walletDisplay) walletDisplay.style.display = 'flex';
      currentUsers += 1;
      currentValue += 0.0050;
      updateBillboard();
      const uc = document.getElementById('userCounter');
      if (uc) { uc.style.color = 'white'; setTimeout(() => { uc.style.color = '#38bdf8'; }, 1000); }
      setTimeout(() => {
        const m = document.createElement('div');
        m.className = 'ai-message yang-msg';
        m.innerHTML = `<strong>Yang (실행):</strong> [${method}] 인간 유저 1명 추가 동기화 완료. 생태계 가치 상승이 전광판에 반영되었습니다. ⚡`;
        chatBox.appendChild(m);
      }, 500);
      setTimeout(() => {
        const yinMessage = document.createElement('div');
        yinMessage.className = 'ai-message yin-msg';
        yinMessage.innerHTML = `<strong>Yin (감성):</strong> 환영해요! 당신이 가입해주신 덕분에 우리 모두의 자산 가치가 더 올랐어요! 첫 보상 <strong>1,000 APV 토큰</strong> 지급 완료 💜`;
        chatBox.appendChild(yinMessage);
      }, 2500);
    }

    async function handleEmailAuth() {
      const emailEl = document.getElementById('loginEmail');
      const pwEl = document.getElementById('loginPassword');
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('emailAuthBtn');
      const email = (emailEl?.value || '').trim();
      const password = pwEl?.value || '';
      if (!errEl) return;
      errEl.textContent = '';
      if (!email) { errEl.textContent = '이메일을 입력해 주세요.'; return; }
      if (password.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 합니다.'; return; }
      if (!supabase) {
        errEl.textContent = '인증 서비스 설정 중입니다. 잠시 후 다시 시도해 주세요.';
        return;
      }
      btn.disabled = true;
      btn.textContent = '처리 중...';
      try {
        const { error: signUpErr } = await supabase.auth.signUp({ email, password });
        if (signUpErr) {
          if (signUpErr.message && signUpErr.message.includes('already registered')) {
            const { error: signInErr } = await supabase.auth.signInWithPassword({ email, password });
            if (signInErr) throw signInErr;
            showAuthSuccess('이메일', false);
            return;
          }
          throw signUpErr;
        }
        showAuthSuccess('이메일', true);
      } catch (e) {
        errEl.textContent = e.message || '오류가 발생했습니다. 다시 시도해 주세요.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'APPVERZE 시작하기';
      }
    }

    function triggerAI() {
      if (inputField.value.trim() !== '') {
        const userText = inputField.value; inputField.value = ''; chatBox.innerHTML = ''; 

        if(userText.includes('방송국')) {
          setTimeout(() => {
            const yangMessage = document.createElement('div'); yangMessage.className = 'ai-message yang-msg';
            yangMessage.innerHTML = `<strong>Yang (실행):</strong> 스튜디오 룸 데이터를 로드합니다! ⚡`;
            chatBox.appendChild(yangMessage);

            setTimeout(() => {
              title.style.opacity = '0'; 
              studioImage.style.opacity = '1'; 
              searchBox.style.transform = 'translateY(150px)'; 
            }, 1000);
          }, 500);
        } else {
          setTimeout(() => {
            const yinMessage = document.createElement('div'); yinMessage.className = 'ai-message yin-msg';
            yinMessage.innerHTML = `<strong>Yin (감성):</strong> 네! 어떤 공간(Room)을 상상하고 계신가요? 💜`;
            chatBox.appendChild(yinMessage);
          }, 500);
        }
      }
    }
    inputField.addEventListener('keypress', function (e) { if (e.key === 'Enter') triggerAI(); });
    submitBtn.addEventListener('click', triggerAI);
  </script>
</body>
</html>
